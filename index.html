<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #fff; margin: 0; padding: 0; color: #000; -webkit-tap-highlight-color: transparent; overflow-x: hidden; user-select: none; -webkit-user-select: none; }
        .version-tag { position: fixed; top: 8px; right: 8px; background: rgba(0,0,0,0.6); color: #fff; padding: 4px 8px; border-radius: 8px; font-size: 10px; z-index: 10001; pointer-events: none; font-weight: 600; }
        
        .header-sticky { position: sticky; top: 0; background: #fff; z-index: 1000; padding: 25px 20px 15px 20px; border-bottom: 1px solid #f2f2f2; text-align: center; }
        .reload-btn { position: absolute; left: 15px; top: 28px; background: none; border: none; font-size: 20px; cursor: pointer; padding: 5px; opacity: 0.6; }
        
        h2 { font-size: 20px; margin: 0 0 20px 0; font-weight: 800; }
        
        .tabs { display: flex; justify-content: center; gap: 12px; margin-bottom: 15px; align-items: center; height: 50px; }
        .tab { font-size: 13px; font-weight: 700; color: #999; padding: 8px 16px; border-radius: 12px; cursor: pointer; transition: all 0.3s ease; background: #f5f5f5; border: none; }
        .tab.active { transform: scale(1.1); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .tab[data-tab="active"].active { background: #34c759; color: #fff; }
        .tab[data-tab="hidden"].active { background: #8e8e93; color: #fff; }
        .tab[data-tab="trash"].active { background: #ff3b30; color: #fff; }

        .selection-actions { display: none; gap: 8px; width: 100%; max-width: 350px; margin: 0 auto; }
        .sel-btn { flex: 1; padding: 15px; border-radius: 14px; font-size: 13px; font-weight: 700; border: none; cursor: pointer; }
        .btn-cancel { background: #f2f2f2; color: #000; }
        .btn-action-main { background: #000; color: #fff; }
        .btn-action-delete { background: #ffebeb; color: #ff3b30; }

        .container { padding: 20px; display: flex; flex-direction: column; align-items: center; width: 100%; box-sizing: border-box; }
        .btn-black { background: #000; color: #fff; border: none; padding: 18px; border-radius: 16px; width: 100%; max-width: 350px; font-weight: 700; font-size: 16px; cursor: pointer; display: block; margin: 0 auto; }
        
        .project-card { border: 1px solid #eee; border-radius: 18px; padding: 18px; margin-bottom: 12px; display: flex; flex-direction: row; align-items: center; width: 100%; max-width: 350px; box-sizing: border-box; position: relative; background: #fff; cursor: pointer; transition: all 0.2s ease; }
        .project-card.selected { border: 2px solid #007aff !important; background: #f0f7ff !important; transform: scale(0.98); }
        
        .card-content { flex: 1; pointer-events: none; }
        .card-checkbox { width: 20px; height: 20px; margin-right: 12px; pointer-events: none; accent-color: #007aff; display: none; }
        .selection-mode .card-checkbox { display: block; }

        .main-input { width: 100%; padding: 14px; border: 1px solid #efefef; border-radius: 12px; font-size: 16px; font-weight: 600; box-sizing: border-box; background: #f9f9f9; color: #000; caret-color: #000; outline: none; user-select: text; -webkit-user-select: text; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="version-tag">v. 01.12 STABLE-SEL</div>

<div id="mainView">
    <div class="header-sticky">
        <button class="reload-btn" onclick="window.location.reload()">🔄</button>
        <h2>Локации</h2>
        <div class="tabs">
            <div id="t-active" class="tab active" data-tab="active" onclick="switchTab('active')">Активные</div>
            <div id="t-hidden" class="tab" data-tab="hidden" onclick="switchTab('hidden')">🙈 Скрытые</div>
            <div id="t-trash" class="tab" data-tab="trash" onclick="switchTab('trash')">Корзина</div>
        </div>
        
        <div id="selectionActions" class="selection-actions">
            <button class="sel-btn btn-cancel" onclick="exitSelectionMode()">Отмена</button>
            <button id="mainActionBtn" class="sel-btn btn-action-main" onclick="applyBulkAction('status')">Действие</button>
            <button id="deleteActionBtn" class="sel-btn btn-action-delete" onclick="applyBulkAction('trash')">🗑</button>
        </div>

        <button id="addBtn" class="btn-black" onclick="createNewProject()">+ Создать план</button>
    </div>
    <div class="container" id="projectList"></div>
</div>

<!-- Окна редактора -->
<div id="editorView" class="hidden">
    <div style="padding: 20px; display: flex; justify-content: space-between; border-bottom: 1px solid #eee;">
        <button onclick="showView('mainView')" style="background:none; border:none; color:#007aff; font-weight:600;">Отмена</button>
        <button onclick="showView('locationView')" style="background:none; border:none; color:#34c759; font-weight:800;">Далее</button>
    </div>
    <div class="container">
        <input type="text" id="pTitle" class="main-input" placeholder="Название проекта" style="margin-bottom:15px;">
        <input type="text" id="pDate" class="main-input mask-input" data-mask="date" placeholder="Дата (дд.мм)" maxlength="5" inputmode="decimal" style="margin-bottom:15px;">
        <input type="text" id="pTagText" class="main-input" placeholder="Тег #">
    </div>
</div>

<div id="locationView" class="hidden">
    <div style="padding: 20px; display: flex; justify-content: space-between; border-bottom: 1px solid #eee;">
        <button onclick="showView('editorView')" style="background:none; border:none; color:#007aff; font-weight:600;">Назад</button>
        <button onclick="showView('planView')" style="background:none; border:none; color:#34c759; font-weight:800;">Далее</button>
    </div>
    <div class="container">
        <input type="text" id="pTime" class="main-input mask-input" data-mask="time" placeholder="Сбор (00:00)" maxlength="5" inputmode="decimal" style="margin-bottom:15px;">
        <input type="text" id="pExitTime" class="main-input mask-input" data-mask="time" placeholder="Выезд (00:00)" maxlength="5" inputmode="decimal" style="margin-bottom:15px;">
        <input type="text" id="pAddress" class="main-input" placeholder="Общий адрес">
    </div>
</div>

<div id="planView" class="hidden">
    <div style="padding: 20px; display: flex; justify-content: space-between; border-bottom: 1px solid #eee;">
        <button onclick="showView('locationView')" style="background:none; border:none; color:#007aff; font-weight:600;">Назад</button>
        <button onclick="finalSaveAll()" style="background:none; border:none; color:#34c759; font-weight:800;">ГОТОВО</button>
    </div>
    <div class="container">
        <h3 style="width:100%">Локации</h3>
        <div id="locationsList" style="width:100%"></div>
        <button onclick="addLocationBlock()" style="width:100%; padding:15px; border:2px dashed #ccc; border-radius:15px; background:none; color:#888; font-weight:700; margin-top:10px;">+ Добавить место</button>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://ndgkvnuyngwhecyqsdbp.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_7o_wxB527BROaf9QKHxcnw_5B7rUUn-';
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const tg = window.Telegram.WebApp;
    const uid = tg.initDataUnsafe?.user?.id?.toString() || "demo";

    let currentTab = 'active', isSelectionMode = false, selectedIds = new Set();
    let locations = [], currentEditId = null, pressTimer;

    // Логика масок
    document.addEventListener('keydown', (e) => {
        if (!e.target.classList.contains('mask-input')) return;
        const input = e.target; const key = e.key; const sep = input.dataset.mask === 'date' ? '.' : ':';
        if (['ArrowLeft', 'ArrowRight', 'Tab', 'Enter', 'Shift'].includes(key)) return;
        if (key === 'Backspace') {
            let pos = input.selectionStart;
            if (input.value[pos-1] === sep) {
                e.preventDefault();
                input.value = input.value.substring(0, pos-2) + input.value.substring(pos);
                input.setSelectionRange(pos-2, pos-2);
            }
            return;
        }
        if (!/\d/.test(key)) { e.preventDefault(); return; }
        if (input.value.replace(/\D/g, '').length === 2 && input.selectionStart === 2) input.value += sep;
    });

    document.addEventListener('input', (e) => {
        if (!e.target.classList.contains('mask-input')) return;
        const input = e.target; const sep = input.dataset.mask === 'date' ? '.' : ':';
        let val = input.value.replace(/\D/g, '');
        if (val.length > 2) input.value = val.slice(0, 2) + sep + val.slice(2, 4);
        else input.value = val;
    });

    // НОВАЯ ЛОГИКА ВЫБОРА ДЛЯ ПК И ТАЧПАДА
    function onCardStart(e, id) {
        if (currentTab === 'trash' || isSelectionMode) return;
        
        // Запускаем таймер на 600мс
        pressTimer = setTimeout(() => {
            activateSelectionMode(id);
        }, 600);
    }

    function onCardEnd() {
        clearTimeout(pressTimer);
    }

    function activateSelectionMode(id) {
        isSelectionMode = true;
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy');
        toggleSelection(id);
        updateUI();
    }

    function handleCardClick(e, id) {
        // Если уже в режиме выбора, просто переключаем чекбокс
        if (isSelectionMode || currentTab === 'trash') {
            toggleSelection(id);
        } else {
            // Если обычный клик (не зажатие), открываем редактор
            openEdit(id);
        }
    }

    function toggleSelection(id) {
        const el = document.querySelector(`[data-id="${id}"]`);
        if (selectedIds.has(id)) {
            selectedIds.delete(id);
            if (el) el.classList.remove('selected');
        } else {
            selectedIds.add(id);
            if (el) el.classList.add('selected');
        }
        
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        
        // Если сняли выделение со всего — выходим из режима (кроме корзины)
        if (selectedIds.size === 0 && currentTab !== 'trash') {
            exitSelectionMode();
        } else {
            updateUI();
        }
    }

    function exitSelectionMode() {
        isSelectionMode = false;
        selectedIds.clear();
        updateUI();
        loadProjects();
    }

    function updateUI() {
        const actions = document.getElementById('selectionActions'), addBtn = document.getElementById('addBtn');
        const mainBtn = document.getElementById('mainActionBtn'), delBtn = document.getElementById('deleteActionBtn');
        const list = document.getElementById('projectList');

        if (isSelectionMode || currentTab === 'trash') list.classList.add('selection-mode');
        else list.classList.remove('selection-mode');

        if (selectedIds.size > 0 || (currentTab === 'trash' && isSelectionMode)) {
            actions.style.display = 'flex'; addBtn.style.display = 'none';
            if (currentTab === 'active') mainBtn.innerText = `Скрыть (${selectedIds.size})`;
            else if (currentTab === 'hidden') mainBtn.innerText = `В актив (${selectedIds.size})`;
            else if (currentTab === 'trash') { mainBtn.innerText = `Вернуть (${selectedIds.size})`; delBtn.innerText = "Удалить"; }
        } else {
            actions.style.display = 'none'; addBtn.style.display = (currentTab === 'active') ? 'block' : 'none';
        }
    }

    async function loadProjects() {
        const { data, error } = await client.from('projects').select('*').eq('user_id', uid).eq('status', currentTab).order('created_at', {ascending: false});
        const list = document.getElementById('projectList');
        if (error) return;
        list.innerHTML = data?.length ? data.map(p => `
            <div class="project-card ${selectedIds.has(p.id) ? 'selected' : ''}" 
                 data-id="${p.id}"
                 onclick="handleCardClick(event, '${p.id}')"
                 onmousedown="onCardStart(event, '${p.id}')"
                 onmouseup="onCardEnd()"
                 onmouseleave="onCardEnd()"
                 ontouchstart="onCardStart(event, '${p.id}')"
                 ontouchend="onCardEnd()"
                 oncontextmenu="return false;">
                <input type="checkbox" class="card-checkbox" ${selectedIds.has(p.id) ? 'checked' : ''}>
                <div class="card-content">
                    <div style="font-weight:800; font-size:18px; margin-bottom:4px;">${p.title}</div>
                    <div style="font-size:12px; color:#666; margin-bottom:8px;">🗓 ${p.date_scout || '...'} | 📍 ${(p.content?.locations || []).length}</div>
                    ${p.tags ? `<div class="list-tag" style="background:#8e8e93; font-size:9px; padding:3px 8px; border-radius:6px; color:#fff; font-weight:700;">${p.tags}</div>` : ''}
                </div>
            </div>
        `).join('') : '<p style="color:#bbb; margin-top:40px;">Пусто</p>';
        updateUI();
    }

    // Системные функции
    function switchTab(t) { currentTab = t; exitSelectionMode(); document.querySelectorAll('.tab').forEach(el => el.classList.remove('active')); document.getElementById('t-' + t).classList.add('active'); if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium'); loadProjects(); }
    async function applyBulkAction(type) { if (selectedIds.size === 0) return; let newStatus = type === 'trash' ? 'trash' : (currentTab === 'active' ? 'hidden' : 'active'); let query = (currentTab === 'trash' && type === 'trash') ? client.from('projects').delete().in('id', Array.from(selectedIds)) : client.from('projects').update({ status: newStatus }).in('id', Array.from(selectedIds)); const { error } = await query; if (!error) { if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred(type === 'trash' ? 'error' : 'success'); exitSelectionMode(); } }
    async function openEdit(id) { const { data } = await client.from('projects').select('*').eq('id', id).single(); if (data) { currentEditId = data.id; document.getElementById('pTitle').value = data.title; document.getElementById('pDate').value = data.date_scout; document.getElementById('pTagText').value = data.tags; const c = data.content || {}; document.getElementById('pTime').value = c.meeting_time || ''; document.getElementById('pExitTime').value = c.exit_time || ''; document.getElementById('pAddress').value = c.location_address || ''; locations = c.locations || []; renderLocations(); showView('editorView'); } }
    async function finalSaveAll() { const payload = { user_id: uid, title: document.getElementById('pTitle').value, date_scout: document.getElementById('pDate').value, tags: document.getElementById('pTagText').value, content: { meeting_time: document.getElementById('pTime').value, exit_time: document.getElementById('pExitTime').value, location_address: document.getElementById('pAddress').value, locations: locations }, status: 'active' }; const { error } = await client.from('projects').upsert({ id: currentEditId || undefined, ...payload }); if (!error) { tg.HapticFeedback.notificationOccurred('success'); showView('mainView'); } }
    function createNewProject() { currentEditId = null; locations = []; document.querySelectorAll('input').forEach(i => i.value = ''); renderLocations(); showView('editorView'); }
    function addLocationBlock() { locations.push({ id: Date.now(), name: '', time_start: '' }); renderLocations(); }
    function renderLocations() { document.getElementById('locationsList').innerHTML = locations.map(l => ` <div style="background:#f9f9f9; padding:15px; border-radius:15px; margin-bottom:10px;"> <input type="text" class="main-input" placeholder="Место" value="${l.name}" onchange="updateLoc(${l.id}, 'name', this.value)" style="margin-bottom:8px;"> <input type="text" class="main-input mask-input" data-mask="time" placeholder="Время (00:00)" maxlength="5" inputmode="decimal" value="${l.time_start}" onchange="updateLoc(${l.id}, 'time_start', this.value)"> </div> `).join(''); }
    function updateLoc(id, f, v) { const l = locations.find(x => x.id === id); if(l) l[f] = v; }
    function showView(v) { document.querySelectorAll('body > div[id]').forEach(d => d.classList.add('hidden')); document.getElementById(v).classList.remove('hidden'); if(v === 'mainView') loadProjects(); }

    loadProjects();
</script>
</body>
</html>
