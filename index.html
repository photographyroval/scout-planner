<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #fff; margin: 0; padding: 15px; color: #000; text-align: center; }
        h2 { font-size: 24px; margin: 10px 0 20px; font-weight: 800; }
        
        .tabs { display: flex; justify-content: center; align-items: center; gap: 12px; margin-bottom: 25px; height: 60px; }
        
        .tab { 
            font-size: 14px; 
            font-weight: 600; 
            cursor: pointer; 
            color: #999; 
            padding: 10px 16px; 
            border-radius: 12px; 
            border: 2px solid transparent;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 6px;
            background: #fff;
        }

        .tab.active { 
            transform: scale(1.15); 
            color: #000;
        }

        /* Цвета рамок для активных состояний */
        #t-active.active { border-color: #34c759; color: #34c759; }
        #t-hidden.active { border-color: #8e8e93; color: #8e8e93; }
        #t-trash.active { border-color: #ff3b30; color: #ff3b30; }

        /* Минималистичный текстовый символ глаза */
        .eye-sym { display: none; font-size: 12px; }
        #t-hidden.active .eye-sym { display: inline; }

        .project-card { border: 1px solid #eee; border-radius: 14px; padding: 18px; margin-bottom: 15px; position: relative; display: flex; justify-content: space-between; align-items: center; }
        .project-info { flex: 1; cursor: pointer; }
        .project-title { font-weight: 800; font-size: 20px; margin-bottom: 4px; }
        .project-meta { font-size: 15px; font-weight: 700; }
        
        .tag-pill { padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; color: #fff; margin: 2px; display: inline-block; }
        .tag-gray { background: #8e8e93; } .tag-red { background: #ff3b30; } .tag-green { background: #34c759; } .tag-blue { background: #007aff; } .tag-yellow { background: #ffcc00; color: #000; }

        .btn { background: #000; color: #fff; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: 700; font-size: 16px; margin-top: 10px; cursor: pointer; }
        .editor-input { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 10px; margin-bottom: 15px; font-size: 16px; box-sizing: border-box; text-align: center; outline: none; }
        .hidden { display: none; }
        
        .dots-btn { font-size: 24px; color: #ccc; padding: 0 10px; cursor: pointer; }
        .context-menu { position: absolute; right: 10px; top: 50px; background: #fff; border: 1px solid #eee; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); z-index: 100; text-align: left; overflow: hidden; }
        .menu-item { padding: 12px 20px; font-size: 14px; border-bottom: 1px solid #f9f9f9; cursor: pointer; }

        .color-picker { display: flex; justify-content: center; gap: 10px; margin: 10px 0 20px; }
        .color-opt { width: 32px; height: 32px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; box-sizing: border-box; }
        .color-opt.selected { border-color: #000; }
    </style>
</head>
<body>

<div id="mainView">
    <h2>Проекты</h2>
    <div class="tabs">
        <div id="t-active" class="tab active" onclick="switchTab('active')">Активные</div>
        <div id="t-hidden" class="tab" onclick="switchTab('hidden')">
            <span class="eye-sym">○</span> Скрытые
        </div>
        <div id="t-trash" class="tab" onclick="switchTab('trash')">Корзина</div>
    </div>
    <div id="projectList"></div>
    <button id="addBtn" class="btn" onclick="createNewProject()">+ Создать план</button>
</div>

<div id="editorView" class="hidden">
    <!-- Секция редактора без изменений -->
    <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom: 20px;">
        <button onclick="closeEditor()" style="background:none; border:none; font-size:16px;">Отмена</button>
        <button onclick="saveProject()" style="background:none; border:none; font-weight:800; font-size:16px; color:#2481cc;">Готово</button>
    </div>
    
    <input type="text" id="pTitle" class="editor-input" placeholder="Название проекта">
    <input type="text" id="pDate" class="editor-input" placeholder="Дата съемки">
    
    <div style="border: 1px solid #eee; padding: 15px; border-radius: 14px; margin-top: 10px;">
        <input type="text" id="tagInput" class="editor-input" style="margin-bottom:10px;" placeholder="Текст тега">
        <div class="color-picker">
            <div class="color-opt tag-gray" onclick="selectColor('gray', this)"></div>
            <div class="color-opt tag-red" onclick="selectColor('red', this)"></div>
            <div class="color-opt tag-green" onclick="selectColor('green', this)"></div>
            <div class="color-opt tag-blue" onclick="selectColor('blue', this)"></div>
            <div class="color-opt tag-yellow" onclick="selectColor('yellow', this)"></div>
        </div>
        <button class="btn" style="background:#f5f5f5; color:#000; font-size:13px; padding:10px; margin-top:0;" onclick="addTagToList()">+ Добавить тег</button>
        <div id="tempTags" style="margin-top:12px;"></div>
    </div>
</div>

<script>
    // Вся логика JS остается идентичной, включая Supabase и обработку вкладок
    const SUPABASE_URL = 'https://ndgkvnuyngwhecyqsdbp.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_7o_wxB527BROaf9QKHxcnw_5B7rUUn-';
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const tg = window.Telegram.WebApp;
    
    let currentId = null;
    let currentTab = 'active';
    let selectedColor = 'gray';
    let tempTags = [];
    let openMenuId = null;
    const uid = tg.initDataUnsafe?.user?.id?.toString() || "demo";

    async function loadProjects() {
        const { data } = await client.from('projects').select('*').eq('user_id', uid).eq('status', currentTab).order('is_pinned', {ascending: false}).order('created_at', {ascending: false});
        const list = document.getElementById('projectList');
        list.innerHTML = data.map(p => `
            <div class="project-card">
                <div class="project-info" onclick="openProject('${p.id}')">
                    <div class="project-title">${p.is_pinned ? '📌 ' : ''}${p.title}</div>
                    <div class="project-meta">🗓 <b>${p.date_scout || '-'}</b></div>
                    <div style="margin-top:8px;">${(p.tags || []).map(t => {
                        const [n, c] = t.split(':');
                        return `<span class="tag-pill tag-${c || 'gray'}">${n}</span>`;
                    }).join('')}</div>
                </div>
                <div class="dots-btn" onclick="toggleMenu(event, '${p.id}')">⋮</div>
                <div id="menu-${p.id}" class="context-menu hidden">
                    ${currentTab === 'active' ? `<div class="menu-item" onclick="updateStatus('${p.id}', 'hidden')">🔒 Скрыть</div>` : ''}
                    ${currentTab === 'hidden' ? `<div class="menu-item" onclick="updateStatus('${p.id}', 'active')">🔓 Показать</div>` : ''}
                    <div class="menu-item" onclick="togglePin('${p.id}', ${p.is_pinned})">${p.is_pinned ? '📍 Открепить' : '📍 Закрепить'}</div>
                    <div class="menu-item" style="color:red" onclick="updateStatus('${p.id}', 'trash')">🗑 В корзину</div>
                </div>
            </div>
        `).join('') || '<p style="color:#999; margin-top:50px;">Здесь пока ничего нет</p>';
    }

    function switchTab(t) {
        currentTab = t;
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        document.getElementById('t-'+t).classList.add('active');
        document.getElementById('addBtn').classList.toggle('hidden', t === 'trash');
        loadProjects();
    }

    function selectColor(c, el) {
        selectedColor = c;
        document.querySelectorAll('.color-opt').forEach(opt => opt.classList.remove('selected'));
        el.classList.add('selected');
    }

    function addTagToList() {
        const val = document.getElementById('tagInput').value.trim();
        if(val) {
            tempTags.push(`${val}:${selectedColor}`);
            document.getElementById('tagInput').value = '';
            renderTempTags();
        }
    }

    function renderTempTags() {
        document.getElementById('tempTags').innerHTML = tempTags.map((t, i) => {
            const [n, c] = t.split(':');
            return `<span class="tag-pill tag-${c}" onclick="tempTags.splice(${i},1);renderTempTags()">${n} ×</span>`;
        }).join('');
    }

    async function updateStatus(id, s) {
        await client.from('projects').update({ status: s, is_pinned: false }).eq('id', id);
        loadProjects();
    }

    async function togglePin(id, p) {
        await client.from('projects').update({ is_pinned: !p }).eq('id', id);
        loadProjects();
    }

    function createNewProject() {
        currentId = null; tempTags = [];
        document.getElementById('pTitle').value = ''; 
        document.getElementById('pDate').value = '';
        renderTempTags();
        document.getElementById('mainView').classList.add('hidden');
        document.getElementById('editorView').classList.remove('hidden');
    }

    async function openProject(id) {
        if(currentTab === 'trash') return;
        const { data } = await client.from('projects').select('*').eq('id', id).single();
        currentId = data.id; tempTags = data.tags || [];
        document.getElementById('pTitle').value = data.title;
        document.getElementById('pDate').value = data.date_scout || '';
        renderTempTags();
        document.getElementById('mainView').classList.add('hidden');
        document.getElementById('editorView').classList.remove('hidden');
    }

    async function saveProject() {
        await client.from('projects').upsert({
            id: currentId || undefined,
            user_id: uid,
            title: document.getElementById('pTitle').value || "Без названия",
            date_scout: document.getElementById('pDate').value,
            tags: tempTags,
            status: 'active'
        });
        closeEditor();
    }

    function toggleMenu(e, id) {
        e.stopPropagation();
        if (openMenuId && openMenuId !== id) document.getElementById('menu-'+openMenuId).classList.add('hidden');
        const m = document.getElementById('menu-'+id);
        m.classList.toggle('hidden');
        openMenuId = m.classList.contains('hidden') ? null : id;
    }

    function closeEditor() {
        document.getElementById('mainView').classList.remove('hidden');
        document.getElementById('editorView').classList.add('hidden');
        loadProjects();
    }

    window.onclick = () => { if(openMenuId) { document.getElementById('menu-'+openMenuId).classList.add('hidden'); openMenuId = null; } };
    
    loadProjects();
</script>
</body>
</html>
