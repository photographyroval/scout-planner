<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #fff; margin: 0; padding: 0; color: #000; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; overflow-x: hidden; }
        .version-tag { position: fixed; top: 8px; right: 8px; background: rgba(0,0,0,0.6); color: #fff; padding: 4px 8px; border-radius: 8px; font-size: 10px; z-index: 10001; pointer-events: none; }
        
        .header-sticky { position: sticky; top: 0; background: #fff; z-index: 1000; padding: 15px 20px 10px 20px; border-bottom: 1px solid #f2f2f2; text-align: center; }
        .reload-btn { position: absolute; left: 15px; top: 18px; background: none; border: none; font-size: 18px; cursor: pointer; padding: 5px; opacity: 0.5; z-index: 1001; }
        .clear-all-btn { position: absolute; right: 15px; top: 18px; background: none; border: none; font-size: 12px; font-weight: 700; color: #ff3b30; cursor: pointer; display: none; padding: 5px; z-index: 1001; }
        
        h2 { font-size: 18px; margin: 0 0 15px 0; font-weight: 800; }
        
        .tabs { display: flex; justify-content: center; gap: 8px; margin-bottom: 12px; }
        .tab { font-size: 12px; font-weight: 700; color: #999; padding: 6px 14px; border-radius: 10px; cursor: pointer; background: #f5f5f5; border: none; }
        .tab[data-tab="active"].active { background: #34c759; color: #fff; }
        .tab[data-tab="hidden"].active { background: #8e8e93; color: #fff; }
        .tab[data-tab="trash"].active { background: #ff3b30; color: #fff; }

        .selection-actions { display: none; gap: 6px; width: 100%; max-width: 350px; margin: 0 auto; }
        .btn-base { height: 48px; border-radius: 14px; font-size: 14px; font-weight: 700; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-sizing: border-box; transition: opacity 0.2s; }
        .btn-base:active { opacity: 0.7; }
        
        .btn-cancel { background: #f2f2f2; color: #000; flex: 1; }
        .btn-action-main { flex: 2; color: #fff; }
        .btn-action-delete { flex: 1; font-size: 16px; }

        .theme-active { background: #8e8e93; } 
        .theme-hidden { background: #34c759; } 
        .theme-trash-restore { background: #34c759; } 
        .theme-trash-del { background: #ff3b30; color: #fff !important; } 
        .theme-to-trash { background: #ffebeb; color: #ff3b30 !important; } 

        .container { padding: 15px 20px; display: flex; flex-direction: column; align-items: center; }
        .btn-black { background: #000 !important; color: #fff !important; width: 100%; max-width: 350px; margin: 0 auto; display: flex; position: relative; z-index: 100; }
        
        .project-wrapper { width: 100%; max-width: 350px; position: relative; margin-bottom: 10px; overflow: hidden; border-radius: 16px; background: #eee; }
        .swipe-bg { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; align-items: center; padding: 0 20px; color: #fff; font-size: 20px; border-radius: 16px; }
        .bg-hide { background: #8e8e93; justify-content: flex-start; }
        .bg-delete { background: #ff3b30; justify-content: flex-end; }
        
        .project-card { border: 1px solid #eee; border-radius: 16px; padding: 15px; display: flex; align-items: center; width: 100%; box-sizing: border-box; background: #fff; position: relative; z-index: 2; transform: translateX(0); }
        .project-card.selected { border: 2px solid #007aff; background: #f0f7ff; }
        
        .card-checkbox { width: 20px; height: 20px; margin-right: 12px; pointer-events: none; display: none; accent-color: #007aff; }
        .selection-mode .card-checkbox { display: block; }
        .card-content { flex: 1; pointer-events: none; }
    </style>
</head>
<body>

<div class="version-tag">v. 01.25 ADD-BUTTON-FIXED</div>

<div id="mainView">
    <div class="header-sticky">
        <button class="reload-btn" onclick="window.location.reload()">🔄</button>
        <button id="clearAllBtn" class="clear-all-btn" onclick="purgeTrash()">Очистить всё</button>
        <h2>Локации</h2>
        <div class="tabs">
            <div id="t-active" class="tab active" data-tab="active" onclick="switchTab('active')">Активные</div>
            <div id="t-hidden" class="tab" data-tab="hidden" onclick="switchTab('hidden')">Скрытые</div>
            <div id="t-trash" class="tab" data-tab="trash" onclick="switchTab('trash')">Корзина</div>
        </div>
        <div id="selectionActions" class="selection-actions">
            <button class="btn-base btn-cancel" onclick="exitSelectionMode()">Отмена</button>
            <button id="mainActionBtn" class="btn-base btn-action-main" onclick="applyBulkAction()">Действие</button>
            <button id="deleteActionBtn" class="btn-base btn-action-delete" onclick="applyBulkAction('trash')">🗑</button>
        </div>
        <button id="addBtn" class="btn-base btn-black" onclick="createNewProject()">+ Создать план</button>
    </div>
    <div class="container" id="projectList"></div>
</div>

<script>
    const SUPABASE_URL = 'https://ndgkvnuyngwhecyqsdbp.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_7o_wxB527BROaf9QKHxcnw_5B7rUUn-';
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const tg = window.Telegram.WebApp;
    const uid = tg.initDataUnsafe?.user?.id?.toString() || "demo";

    let currentTab = 'active', selectedIds = new Set(), isSelectionMode = false;
    let pressTimer, startX, swipedId = null, moveOccurred = false;

    function touchStart(e, id) {
        startX = e.touches[0].clientX;
        swipedId = id;
        moveOccurred = false;
        clearTimeout(pressTimer);
        pressTimer = setTimeout(() => {
            if (!moveOccurred) {
                isSelectionMode = true;
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy');
                toggleId(id);
            }
        }, 600);
    }

    function touchMove(e) {
        let currentX = e.touches[0].clientX;
        let diff = currentX - startX;
        if (Math.abs(diff) > 10) {
            moveOccurred = true;
            clearTimeout(pressTimer);
            if (!isSelectionMode) {
                let card = document.querySelector(`[data-id="${swipedId}"]`);
                if (card) card.style.transform = `translateX(${diff}px)`;
            }
        }
    }

    function touchEnd(e) {
        clearTimeout(pressTimer);
        if (isSelectionMode) return;
        let card = document.querySelector(`[data-id="${swipedId}"]`);
        if (!card) return;
        let finalDiff = parseFloat(card.style.transform.replace('translateX(', '').replace('px)', '')) || 0;
        card.style.transition = 'transform 0.3s ease';
        if (finalDiff > 120) { 
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            applySingleAction(swipedId, currentTab === 'active' ? 'hidden' : 'active', false);
        } else if (finalDiff < -120) { 
            applySingleAction(swipedId, 'trash', true);
        } else {
            card.style.transform = 'translateX(0)';
        }
        setTimeout(() => { if(card) card.style.transition = ''; }, 300);
    }

    async function applySingleAction(id, newStatus, needConfirm) {
        const action = async () => {
            await client.from('projects').update({ status: newStatus }).eq('id', id);
            loadProjects();
        };
        if (needConfirm) {
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('warning');
            tg.showConfirm("Переместить проект в корзину?", (ok) => {
                if (ok) action();
                else document.querySelector(`[data-id="${id}"]`).style.transform = 'translateX(0)';
            });
        } else { action(); }
    }

    function handleCardClick(e, id) {
        if (moveOccurred) return;
        if (isSelectionMode || currentTab === 'trash') {
            isSelectionMode = true;
            toggleId(id);
        }
    }

    function toggleId(id) {
        if (selectedIds.has(id)) selectedIds.delete(id);
        else selectedIds.add(id);
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        if (selectedIds.size === 0) isSelectionMode = false;
        updateSelectionUI();
        renderSelectionState(); 
    }

    function renderSelectionState() {
        document.querySelectorAll('.project-card').forEach(card => {
            const id = card.getAttribute('data-id');
            const isSelected = selectedIds.has(id);
            card.classList.toggle('selected', isSelected);
            const cb = card.querySelector('.card-checkbox');
            if (cb) cb.checked = isSelected;
        });
    }

    function updateSelectionUI() {
        const actions = document.getElementById('selectionActions');
        const addBtn = document.getElementById('addBtn');
        const clearBtn = document.getElementById('clearAllBtn');
        const mainBtn = document.getElementById('mainActionBtn');
        const delBtn = document.getElementById('deleteActionBtn');

        clearBtn.style.display = (currentTab === 'trash' && selectedIds.size === 0) ? 'block' : 'none';

        if (selectedIds.size > 0) {
            actions.style.display = 'flex';
            addBtn.style.display = 'none';
            let count = selectedIds.size;
            if (currentTab === 'active') {
                mainBtn.innerText = `Скрыть (${count})`;
                mainBtn.className = "btn-base btn-action-main theme-active";
                delBtn.className = "btn-base btn-action-delete theme-to-trash";
            } else if (currentTab === 'hidden') {
                mainBtn.innerText = `В актив (${count})`;
                mainBtn.className = "btn-base btn-action-main theme-hidden";
                delBtn.className = "btn-base btn-action-delete theme-to-trash";
            } else {
                mainBtn.innerText = `Вернуть (${count})`;
                mainBtn.className = "btn-base btn-action-main theme-trash-restore";
                mainBtn.style.flex = "1";
                delBtn.innerText = "Удалить";
                delBtn.className = "btn-base btn-action-delete theme-trash-del";
                delBtn.style.flex = "1.5";
            }
        } else {
            actions.style.display = 'none';
            addBtn.style.display = (currentTab === 'active') ? 'flex' : 'none';
        }
    }

    function exitSelectionMode() {
        isSelectionMode = false;
        selectedIds.clear();
        updateSelectionUI();
        renderSelectionState();
    }

    async function applyBulkAction(type) {
        if (selectedIds.size === 0) return;
        const action = async () => {
            if (currentTab === 'trash' && type === 'trash') {
                await client.from('projects').delete().in('id', Array.from(selectedIds));
            } else {
                let ns = type === 'trash' ? 'trash' : (currentTab === 'active' ? 'hidden' : 'active');
                await client.from('projects').update({ status: ns }).in('id', Array.from(selectedIds));
            }
            exitSelectionMode();
            loadProjects();
        };
        if (type === 'trash' || currentTab === 'trash') {
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('warning');
            tg.showConfirm("Подтвердите безвозвратное действие", (ok) => { if (ok) action(); });
        } else { action(); }
    }

    function purgeTrash() {
        tg.showConfirm("Очистить всю корзину навсегда?", async (ok) => {
            if (ok) {
                await client.from('projects').delete().eq('user_id', uid).eq('status', 'trash');
                loadProjects();
            }
        });
    }

    async function loadProjects() {
        const { data } = await client.from('projects').select('*').eq('user_id', uid).eq('status', currentTab).order('created_at', {ascending: false});
        const list = document.getElementById('projectList');
        list.innerHTML = (data || []).map(p => `
            <div class="project-wrapper">
                <div class="swipe-bg bg-hide">👁‍🗨</div>
                <div class="swipe-bg bg-delete">🗑</div>
                <div class="project-card" 
                     data-id="${p.id}"
                     ontouchstart="touchStart(event, '${p.id}')"
                     ontouchmove="touchMove(event)"
                     ontouchend="touchEnd(event)"
                     onclick="handleCardClick(event, '${p.id}')">
                    <input type="checkbox" class="card-checkbox">
                    <div class="card-content">
                        <div style="font-weight:800; font-size:16px;">${p.title}</div>
                        <div style="font-size:11px; color:#666;">🗓 ${p.date_scout || 'Нет даты'}</div>
                    </div>
                </div>
            </div>
        `).join('');
        updateSelectionUI();
    }

    function switchTab(t) {
        currentTab = t;
        exitSelectionMode();
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        document.querySelector(`.tab[data-tab="${t}"]`).classList.add('active');
        loadProjects();
    }

    function createNewProject() { 
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        console.log("Creating new project...");
        // Здесь ваша логика открытия модалки или перехода к созданию
    }

    loadProjects();
</script>
</body>
</html>
