<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #fff; margin: 0; padding: 15px; color: #000; text-align: center; }
        h2 { font-size: 22px; margin: 10px 0; font-weight: 800; }
        
        /* Фиксированная верхняя панель */
        .header-sticky { position: sticky; top: 0; background: #fff; z-index: 1000; padding-bottom: 10px; border-bottom: 1px solid #f9f9f9; }
        
        .tabs { display: flex; justify-content: center; align-items: center; gap: 10px; margin: 10px 0 20px; height: 60px; }
        .tab { 
            font-size: 13px; font-weight: 600; cursor: pointer; color: #999; padding: 8px 14px; border-radius: 12px; 
            border: 2px solid transparent; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; gap: 5px;
        }
        .tab.active { transform: scale(1.15); color: #000; }
        #t-active.active { border-color: #34c759; color: #34c759; }
        #t-hidden.active { border-color: #8e8e93; color: #8e8e93; }
        #t-trash.active { border-color: #ff3b30; color: #ff3b30; }

        /* Карточка с поддержкой выбора */
        .project-card { 
            border: 1px solid #eee; border-radius: 14px; padding: 15px; margin-bottom: 12px; 
            display: flex; align-items: center; gap: 12px; transition: all 0.2s;
        }
        .project-card.selected { border-color: #007aff; background: #f0f7ff; }
        
        .checkbox { 
            width: 22px; height: 22px; border: 2px solid #ddd; border-radius: 6px; 
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .selected .checkbox { background: #007aff; border-color: #007aff; }
        .selected .checkbox::after { content: '✓'; color: #fff; font-size: 14px; }

        .project-info { flex: 1; text-align: left; cursor: pointer; }
        .project-title { font-weight: 800; font-size: 17px; }
        
        /* Нижняя панель действий */
        .action-bar { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            background: #000; color: #fff; padding: 12px 20px; border-radius: 20px;
            display: flex; gap: 20px; z-index: 2000; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .btn { background: #000; color: #fff; border: none; padding: 14px; border-radius: 12px; width: 100%; font-weight: 700; font-size: 15px; cursor: pointer; }
        .hidden { display: none !important; }
        .dots-btn { font-size: 20px; color: #ccc; padding: 5px; }
        
        .eye-sym { display: none; }
        #t-hidden.active .eye-sym { display: inline; }
    </style>
</head>
<body>

<div id="mainView">
    <div class="header-sticky">
        <h2>Мои Проекты</h2>
        <div class="tabs">
            <div id="t-active" class="tab active" onclick="switchTab('active')">Активные</div>
            <div id="t-hidden" class="tab" onclick="switchTab('hidden')"><span class="eye-sym">🙈</span> Скрытые</div>
            <div id="t-trash" class="tab" onclick="switchTab('trash')">Корзина</div>
        </div>
        <button id="addBtn" class="btn" onclick="createNewProject()">+ Создать план</button>
    </div>

    <div id="projectList" style="margin-top: 20px;"></div>
</div>

<!-- Панель массовых действий -->
<div id="multiAction" class="action-bar hidden">
    <span id="selectCount" style="margin-right: 10px; font-weight: 800;">0</span>
    <span onclick="bulkStatus('active')" id="btnRestore" class="hidden">📦 В активные</span>
    <span onclick="bulkStatus('hidden')" id="btnHide">🙈 Скрыть</span>
    <span onclick="bulkStatus('trash')" style="color: #ff3b30;">🗑 Удалить</span>
</div>

<!-- Редактор (без изменений) -->
<div id="editorView" class="hidden">
    <!-- ... (код редактора из прошлых сообщений) ... -->
</div>

<script>
    const SUPABASE_URL = 'https://ndgkvnuyngwhecyqsdbp.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_7o_wxB527BROaf9QKHxcnw_5B7rUUn-';
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const tg = window.Telegram.WebApp;
    
    let currentTab = 'active';
    let selectedIds = new Set();
    const uid = tg.initDataUnsafe?.user?.id?.toString() || "demo";

    async function loadProjects() {
        const { data } = await client.from('projects').select('*').eq('user_id', uid).eq('status', currentTab).order('is_pinned', {ascending: false}).order('created_at', {ascending: false});
        const list = document.getElementById('projectList');
        
        list.innerHTML = data.map(p => `
            <div class="project-card ${selectedIds.has(p.id) ? 'selected' : ''}" id="card-${p.id}" onclick="toggleSelect('${p.id}')">
                <div class="checkbox"></div>
                <div class="project-info">
                    <div class="project-title">${p.is_pinned ? '📌 ' : ''}${p.title}</div>
                    <div style="font-size:13px; color:#888">🗓 ${p.date_scout || '-'}</div>
                </div>
                <div class="dots-btn" onclick="event.stopPropagation(); openProject('${p.id}')">✎</div>
            </div>
        `).join('') || '<p style="color:#999; margin-top:40px;">Нет проектов</p>';
    }

    function toggleSelect(id) {
        if (selectedIds.has(id)) selectedIds.delete(id);
        else selectedIds.add(id);
        
        const card = document.getElementById(`card-${id}`);
        card.classList.toggle('selected');
        updateActionBar();
    }

    function updateActionBar() {
        const bar = document.getElementById('multiAction');
        const count = document.getElementById('selectCount');
        const btnRestore = document.getElementById('btnRestore');
        const btnHide = document.getElementById('btnHide');

        if (selectedIds.size > 0) {
            bar.classList.remove('hidden');
            count.innerText = selectedIds.size;
            
            // Настройка кнопок в зависимости от вкладки
            btnRestore.classList.toggle('hidden', currentTab === 'active');
            btnHide.classList.toggle('hidden', currentTab === 'hidden' || currentTab === 'trash');
        } else {
            bar.classList.add('hidden');
        }
    }

    async function bulkStatus(newStatus) {
        const ids = Array.from(selectedIds);
        await client.from('projects').update({ status: newStatus, is_pinned: false }).in('id', ids);
        selectedIds.clear();
        updateActionBar();
        loadProjects();
    }

    function switchTab(t) {
        currentTab = t;
        selectedIds.clear();
        updateActionBar();
        
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        document.getElementById('t-'+t).classList.add('active');
        
        // Кнопка создания видна только в активных
        document.getElementById('addBtn').classList.toggle('hidden', t !== 'active');
        
        loadProjects();
    }

    // Вспомогательные функции для создания/редактирования
    function createNewProject() {
        // Логика открытия редактора для НОВОГО проекта
        // ... (используй функцию из предыдущего кода)
    }

    async function openProject(id) {
        // Логика открытия редактора для существующего проекта
        // ... (используй функцию из предыдущего кода)
    }

    loadProjects();
</script>
</body>
</html>
