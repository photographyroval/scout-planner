https://yandex.com.ge/maps/10277/tbilisi/?ll=44.801559%2C41.693081&z=7<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #fff; margin: 0; padding: 0; color: #000; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .version-tag { position: fixed; top: 8px; right: 8px; background: rgba(0,0,0,0.6); color: #fff; padding: 4px 8px; border-radius: 8px; font-size: 10px; z-index: 10001; pointer-events: none; font-weight: 600; }
        
        .header-sticky { position: sticky; top: 0; background: #fff; z-index: 1000; padding: 10px 20px; border-bottom: 1px solid #f2f2f2; text-align: center; }
        h2 { font-size: 20px; margin: 10px 0; font-weight: 800; }
        
        .tabs { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .tab { font-size: 13px; font-weight: 600; color: #999; padding: 8px 12px; border-radius: 10px; border: 2px solid transparent; cursor: pointer; transition: 0.2s; }
        
        .tab#t-active.active { color: #34c759; border-color: #34c759; background: rgba(52, 199, 89, 0.08); }
        .tab#t-hidden.active { color: #8e8e93; border-color: #8e8e93; background: rgba(142, 142, 147, 0.08); }
        .tab#t-trash.active { color: #ff3b30; border-color: #ff3b30; background: rgba(255, 59, 48, 0.08); }

        .container { padding: 20px; display: flex; flex-direction: column; align-items: center; width: 100%; box-sizing: border-box; }
        .btn-black { background: #000; color: #fff; border: none; padding: 18px; border-radius: 16px; width: 100%; max-width: 350px; font-weight: 700; font-size: 16px; cursor: pointer; display: block; margin: 0 auto; }
        
        .input-group { margin-bottom: 20px; width: 100%; max-width: 350px; }
        .input-label { font-size: 13px; color: #888; margin-bottom: 8px; display: block; font-weight: 500; text-align: left; }
        
        .main-input { width: 100%; padding: 16px; border: 1px solid #efefef; border-radius: 14px; font-size: 16px; font-weight: 600; box-sizing: border-box; outline: none; background: #f9f9f9; }
        .main-input:focus { border-color: #007aff; background: #fff; }

        .nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; border-bottom: 1px solid #f9f9f9; }
        .nav-btn { background: none; border: none; font-size: 16px; cursor: pointer; font-weight: 600; }
        
        .project-card { border: 1px solid #eee; border-radius: 18px; padding: 18px; margin-bottom: 12px; display: flex; align-items: center; width: 100%; max-width: 350px; box-sizing: border-box; text-align: left; }
        .address-link { color: #007aff; text-decoration: none; font-weight: 700; font-size: 17px; word-break: break-word; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="version-tag">v. 30.04 14:46 (Tbilisi)</div>

<!-- ГЛАВНЫЙ ЭКРАН -->
<div id="mainView">
    <div class="header-sticky">
        <h2>Мои Проекты</h2>
        <div class="tabs">
            <div id="t-active" class="tab active" onclick="switchTab('active')">Активные</div>
            <div id="t-hidden" class="tab" onclick="switchTab('hidden')">🙈 Скрытые</div>
            <div id="t-trash" class="tab" onclick="switchTab('trash')">Корзина</div>
        </div>
        <button id="addBtn" class="btn-black" onclick="createNewProject()">+ Создать план</button>
    </div>
    <div class="container" id="projectList"></div>
</div>

<!-- ШАГ 1: ОСНОВНОЕ -->
<div id="editorView" class="hidden">
    <div class="nav-bar">
        <button class="nav-btn" onclick="showView('mainView')" style="color: #007aff;">← Отмена</button>
        <button class="nav-btn" onclick="showView('locationView')" style="color: #34c759;">Далее</button>
    </div>
    <div class="container">
        <h3 style="font-size: 26px; font-weight: 800; width: 100%; margin-bottom: 30px; text-align: left;">Основное</h3>
        <div class="input-group">
            <span class="input-label">Название проекта</span>
            <input type="text" id="pTitle" class="main-input" placeholder="Например: Съемка в Старом городе">
        </div>
        <div class="input-group">
            <span class="input-label">Дата</span>
            <input type="text" id="pDate" class="main-input" placeholder="30.04" maxlength="5">
        </div>
    </div>
</div>

<!-- ШАГ 2: СБОР -->
<div id="locationView" class="hidden">
    <div class="nav-bar">
        <button class="nav-btn" onclick="showView('editorView')" style="color: #007aff;">← Назад</button>
        <button class="nav-btn" onclick="finalSave()" style="color: #34c759;">Сохранить</button>
    </div>
    <div class="container">
        <h3 style="font-size: 26px; font-weight: 800; width: 100%; margin-bottom: 30px; text-align: left;">Сбор</h3>
        <div class="input-group">
            <span class="input-label">Место сбора</span>
            <input type="text" id="pAddress" class="main-input" placeholder="ул. Леселидзе, 5">
        </div>
        <div class="input-group">
            <span class="input-label">Ссылка на карту (URL)</span>
            <input type="text" id="pMapUrl" class="main-input" placeholder="https://maps.app.goo.gl/...">
        </div>
        <div class="input-group">
            <span class="input-label">Время сбора</span>
            <input type="time" id="pTime" class="main-input">
        </div>
    </div>
</div>

<!-- ФИНАЛЬНЫЙ ПРОСМОТР -->
<div id="detailsView" class="hidden">
    <div class="nav-bar">
        <button class="nav-btn" onclick="showView('mainView')" style="color: #007aff;">← К проектам</button>
    </div>
    <div class="container">
        <div style="width: 100%; max-width: 350px; text-align: left;">
            <h2 id="finalTitle" style="font-size: 28px; margin-bottom: 5px;"></h2>
            <p id="finalDate" style="color: #888; font-weight: 600; margin-bottom: 30px;"></p>
            <div style="background: #f2f2f7; padding: 25px; border-radius: 24px;">
                <div style="margin-bottom: 20px;">
                    <span style="font-size: 11px; color: #8e8e93; display: block; margin-bottom: 5px;">МЕСТО СБОРА</span>
                    <a id="finalAddress" href="#" class="address-link" target="_blank"></a>
                </div>
                <div>
                    <span style="font-size: 11px; color: #8e8e93; display: block; margin-bottom: 5px;">ВРЕМЯ</span>
                    <span id="finalTime" style="font-weight: 700; font-size: 20px;"></span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://ndgkvnuyngwhecyqsdbp.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_7o_wxB527BROaf9QKHxcnw_5B7rUUn-';
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const tg = window.Telegram.WebApp;
    const uid = tg.initDataUnsafe?.user?.id?.toString() || "demo";

    let currentTab = 'active';
    let currentEditId = null;

    function showView(v) {
        // Прячем все корневые экраны
        document.getElementById('mainView').classList.add('hidden');
        document.getElementById('editorView').classList.add('hidden');
        document.getElementById('locationView').classList.add('hidden');
        document.getElementById('detailsView').classList.add('hidden');
        
        // Показываем нужный
        document.getElementById(v).classList.remove('hidden');
        if (v === 'mainView') loadProjects();
    }

    function switchTab(t) {
        currentTab = t;
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        document.getElementById('t-' + t).classList.add('active');
        document.getElementById('addBtn').style.display = (t === 'active') ? 'block' : 'none';
        loadProjects();
    }

    function createNewProject() {
        currentEditId = null;
        ['pTitle', 'pDate', 'pAddress', 'pMapUrl', 'pTime'].forEach(id => document.getElementById(id).value = '');
        showView('editorView');
    }

    async function finalSave() {
        const title = document.getElementById('pTitle').value.trim();
        if (!title) return alert("Введите название");
        
        const payload = {
            user_id: uid,
            title: title,
            date_scout: document.getElementById('pDate').value,
            location_address: document.getElementById('pAddress').value.trim(),
            map_url: document.getElementById('pMapUrl').value.trim(),
            meeting_time: document.getElementById('pTime').value,
            status: 'active'
        };

        const { error } = await client.from('projects').upsert({ id: currentEditId || undefined, ...payload });

        if (!error) {
            document.getElementById('finalTitle').innerText = payload.title;
            document.getElementById('finalDate').innerText = `🗓 ${payload.date_scout || 'дд.мм'}`;
            
            const addr = document.getElementById('finalAddress');
            addr.innerText = payload.location_address || 'Открыть карту';
            // Приоритет ссылке из поля, если её нет — поиск по адресу
            addr.href = payload.map_url || `https://maps.google.com/?q=${encodeURIComponent(payload.location_address)}`;
            
            document.getElementById('finalTime').innerText = payload.meeting_time || '--:--';
            showView('detailsView');
        }
    }

    async function loadProjects() {
        const { data } = await client.from('projects').select('*').eq('user_id', uid).eq('status', currentTab).order('created_at', {ascending: false});
        const list = document.getElementById('projectList');
        list.innerHTML = data?.length ? data.map(p => `
            <div class="project-card" onclick="openEdit('${p.id}')">
                <div style="flex:1">
                    <div style="font-weight:800; font-size:17px;">${p.title}</div>
                    <div style="font-size:13px; color:#888; margin-top:5px;">🗓 ${p.date_scout || 'дд.мм'}</div>
                </div>
                <div style="color:#ddd; font-size:22px;">›</div>
            </div>
        `).join('') : '<p style="color:#bbb; margin-top:50px;">Нет планов</p>';
    }

    async function openEdit(id) {
        const { data } = await client.from('projects').select('*').eq('id', id).single();
        if (data) {
            currentEditId = data.id;
            document.getElementById('pTitle').value = data.title;
            document.getElementById('pDate').value = data.date_scout;
            document.getElementById('pAddress').value = data.location_address || '';
            document.getElementById('pMapUrl').value = data.map_url || '';
            document.getElementById('pTime').value = data.meeting_time || '';
            showView('editorView');
        }
    }

    loadProjects();
</script>
</body>
</html>
