<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #fff; margin: 0; padding: 0; color: #000; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }
        .version-tag { position: fixed; top: 8px; right: 8px; background: rgba(0,0,0,0.6); color: #fff; padding: 4px 8px; border-radius: 8px; font-size: 10px; z-index: 10001; pointer-events: none; }
        
        .header-sticky { position: sticky; top: 0; background: #fff; z-index: 1000; padding: 25px 20px 15px 20px; border-bottom: 1px solid #f2f2f2; text-align: center; }
        .reload-btn { position: absolute; left: 15px; top: 28px; background: none; border: none; font-size: 20px; cursor: pointer; padding: 5px; opacity: 0.6; }
        
        h2 { font-size: 20px; margin: 0 0 20px 0; font-weight: 800; }
        
        .tabs { display: flex; justify-content: center; gap: 12px; margin-bottom: 15px; align-items: center; }
        .tab { font-size: 13px; font-weight: 700; color: #999; padding: 8px 16px; border-radius: 12px; cursor: pointer; background: #f5f5f5; border: none; transition: all 0.3s ease; }
        
        .tab[data-tab="active"].active { background: #34c759; color: #fff; }
        .tab[data-tab="hidden"].active { background: #8e8e93; color: #fff; }
        .tab[data-tab="trash"].active { background: #ff3b30; color: #fff; }

        .selection-actions { display: none; gap: 8px; width: 100%; max-width: 350px; margin: 0 auto; }
        
        .btn-base { height: 58px; border-radius: 16px; font-size: 16px; font-weight: 700; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-sizing: border-box; transition: opacity 0.2s; }
        .btn-base:active { opacity: 0.7; }
        
        .btn-cancel { background: #f2f2f2; color: #000; flex: 1; }
        .btn-action-main { flex: 2; color: #fff; }
        .btn-action-delete { flex: 1; font-size: 18px; }

        /* Темы кнопок */
        .theme-active { background: #8e8e93; } 
        .theme-hidden { background: #34c759; } 
        .theme-trash-restore { background: #34c759; } 
        .theme-trash-del { background: #ff3b30; color: #fff !important; } 
        .theme-to-trash { background: #ffebeb; color: #ff3b30 !important; } 

        .container { padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .btn-black { background: #000; color: #fff; width: 100%; max-width: 350px; margin: 0 auto; display: flex; }
        
        .project-card { border: 1px solid #eee; border-radius: 18px; padding: 18px; margin-bottom: 12px; display: flex; align-items: center; width: 100%; max-width: 350px; box-sizing: border-box; background: #fff; transition: all 0.2s ease; position: relative; cursor: pointer; }
        .project-card.selected { border: 2px solid #007aff; background: #f0f7ff; transform: scale(0.98); }
        
        .card-checkbox { width: 22px; height: 22px; margin-right: 15px; pointer-events: none; display: none; accent-color: #007aff; }
        .selection-mode .card-checkbox { display: block; }
        .card-content { flex: 1; pointer-events: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="version-tag">v. 01.20 TRASH-CONTEXT-FIXED</div>

<div id="mainView">
    <div class="header-sticky">
        <button class="reload-btn" onclick="window.location.reload()">🔄</button>
        <h2>Локации</h2>
        <div class="tabs">
            <div id="t-active" class="tab active" data-tab="active" onclick="switchTab('active')">Активные</div>
            <div id="t-hidden" class="tab" data-tab="hidden" onclick="switchTab('hidden')">Скрытые</div>
            <div id="t-trash" class="tab" data-tab="trash" onclick="switchTab('trash')">Корзина</div>
        </div>
        
        <div id="selectionActions" class="selection-actions">
            <button class="btn-base btn-cancel" onclick="exitSelectionMode()">Отмена</button>
            <button id="mainActionBtn" class="btn-base btn-action-main" onclick="applyBulkAction()">Действие</button>
            <button id="deleteActionBtn" class="btn-base btn-action-delete" onclick="applyBulkAction('trash')">🗑</button>
        </div>

        <button id="addBtn" class="btn-base btn-black" onclick="createNewProject()">+ Создать план</button>
    </div>
    <div class="container" id="projectList"></div>
</div>

<script>
    const SUPABASE_URL = 'https://ndgkvnuyngwhecyqsdbp.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_7o_wxB527BROaf9QKHxcnw_5B7rUUn-';
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const tg = window.Telegram.WebApp;
    const uid = tg.initDataUnsafe?.user?.id?.toString() || "demo";

    let currentTab = 'active', isSelectionMode = false, selectedIds = new Set();
    let pressTimer, isLongPressOccurred = false;

    function startPress(e, id) {
        isLongPressOccurred = false;
        clearTimeout(pressTimer);
        pressTimer = setTimeout(() => {
            isLongPressOccurred = true;
            if (!isSelectionMode) {
                isSelectionMode = true;
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy');
                toggleId(id);
            }
        }, 600);
    }

    function endPress() { clearTimeout(pressTimer); }

    function handleCardClick(e, id) {
        if (isLongPressOccurred) { isLongPressOccurred = false; return; }
        // В корзине любой клик — это выбор/снятие выбора
        if (isSelectionMode || currentTab === 'trash') {
            if (currentTab === 'trash' && !isSelectionMode) isSelectionMode = true;
            toggleId(id);
        } else {
            console.log("Edit project:", id);
        }
    }

    function toggleId(id) {
        if (selectedIds.has(id)) selectedIds.delete(id);
        else selectedIds.add(id);
        
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        
        // Выход из режима если всё снято (кроме корзины, там режим держится пока есть клики)
        if (selectedIds.size === 0) isSelectionMode = false;
        
        updateSelectionUI();
        renderSelectionState(); 
    }

    function renderSelectionState() {
        document.querySelectorAll('.project-card').forEach(card => {
            const id = card.getAttribute('data-id');
            const checkbox = card.querySelector('.card-checkbox');
            const isSelected = selectedIds.has(id);
            card.classList.toggle('selected', isSelected);
            if (checkbox) checkbox.checked = isSelected;
        });
    }

    function updateSelectionUI() {
        const actions = document.getElementById('selectionActions');
        const addBtn = document.getElementById('addBtn');
        const list = document.getElementById('projectList');
        const mainBtn = document.getElementById('mainActionBtn');
        const delBtn = document.getElementById('deleteActionBtn');

        mainBtn.className = "btn-base btn-action-main";
        delBtn.className = "btn-base btn-action-delete";
        mainBtn.style.flex = "2";
        delBtn.style.flex = "1";

        // Показываем действия ТОЛЬКО если есть выбранные элементы
        if (selectedIds.size > 0) {
            list.classList.add('selection-mode');
            actions.style.display = 'flex';
            addBtn.style.display = 'none';
            
            let count = selectedIds.size;
            if (currentTab === 'active') {
                mainBtn.innerText = `Скрыть (${count})`;
                mainBtn.classList.add('theme-active');
                delBtn.classList.add('theme-to-trash');
                delBtn.style.display = 'flex';
            } else if (currentTab === 'hidden') {
                mainBtn.innerText = `В актив (${count})`;
                mainBtn.classList.add('theme-hidden');
                delBtn.classList.add('theme-to-trash');
                delBtn.style.display = 'flex';
            } else if (currentTab === 'trash') {
                mainBtn.innerText = `Вернуть (${count})`;
                mainBtn.classList.add('theme-trash-restore');
                delBtn.innerText = "Удалить";
                delBtn.classList.add('theme-trash-del');
                delBtn.style.display = 'flex';
                delBtn.style.flex = "2";
                mainBtn.style.flex = "1";
            }
        } else {
            // Если ничего не выбрано
            list.classList.remove('selection-mode');
            actions.style.display = 'none';
            // Кнопка добавить только в активных
            addBtn.style.display = (currentTab === 'active') ? 'flex' : 'none';
        }
    }

    function exitSelectionMode() {
        isSelectionMode = false;
        selectedIds.clear();
        updateSelectionUI();
        renderSelectionState();
    }

    async function loadProjects() {
        const { data, error } = await client.from('projects').select('*').eq('user_id', uid).eq('status', currentTab).order('created_at', {ascending: false});
        const list = document.getElementById('projectList');
        if (error || !data) return;
        list.innerHTML = data.map(p => `
            <div class="project-card ${selectedIds.has(p.id) ? 'selected' : ''}" 
                 data-id="${p.id}"
                 onmousedown="startPress(event, '${p.id}')"
                 onmouseup="endPress()"
                 onmouseleave="endPress()"
                 ontouchstart="startPress(event, '${p.id}')"
                 ontouchend="endPress()"
                 onclick="handleCardClick(event, '${p.id}')"
                 oncontextmenu="event.preventDefault(); return false;">
                <input type="checkbox" class="card-checkbox" ${selectedIds.has(p.id) ? 'checked' : ''}>
                <div class="card-content">
                    <div style="font-weight:800; font-size:17px; margin-bottom:4px;">${p.title}</div>
                    <div style="font-size:12px; color:#666;">🗓 ${p.date_scout || 'Нет даты'}</div>
                </div>
            </div>
        `).join('');
        updateSelectionUI();
        renderSelectionState();
    }

    function switchTab(t) {
        currentTab = t;
        exitSelectionMode(); // При смене таба всегда сбрасываем выбор
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        document.querySelector(`.tab[data-tab="${t}"]`).classList.add('active');
        loadProjects();
    }

    async function applyBulkAction(type) {
        if (selectedIds.size === 0) return;
        if (currentTab === 'trash' && type === 'trash') {
            const { error } = await client.from('projects').delete().in('id', Array.from(selectedIds));
            if (!error) { exitSelectionMode(); loadProjects(); }
            return;
        }
        let newStatus = type === 'trash' ? 'trash' : (currentTab === 'active' ? 'hidden' : 'active');
        const { error } = await client.from('projects').update({ status: newStatus }).in('id', Array.from(selectedIds));
        if (!error) {
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            exitSelectionMode();
            loadProjects();
        }
    }

    function createNewProject() { console.log("Create Project"); }

    loadProjects();
</script>
</body>
</html>
