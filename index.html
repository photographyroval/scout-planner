<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ФИКСИРОВАННЫЙ ДИЗАЙН: НЕ ИЗМЕНЯТЬ БЕЗ РАЗРЕШЕНИЯ */
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #fff; margin: 0; padding: 0; color: #000; -webkit-tap-highlight-color: transparent; user-select: none; }
        
        .header-sticky { 
            position: sticky; 
            top: 0; 
            background: #fff; 
            z-index: 1000; 
            padding: 20px 25px; 
            border-bottom: 1px solid #f2f2f2; 
            text-align: center; 
        }
        
        h2 { margin: 0 0 15px 0; font-size: 20px; font-weight: 800; }

        .tabs { display: flex; justify-content: center; gap: 10px; margin-top: 5px; }
        .tab { 
            font-size: 13px; 
            font-weight: 700; 
            color: #999; 
            padding: 10px 18px; 
            border-radius: 12px; 
            cursor: pointer; 
            background: #f5f5f5; 
            border: none; 
            transition: all 0.2s ease;
        }
        .tab.active[data-tab="active"] { background: #34c759; color: #fff; }
        .tab.active[data-tab="hidden"] { background: #8e8e93; color: #fff; }
        .tab.active[data-tab="trash"] { background: #ff3b30; color: #fff; }

        .btn-base { height: 54px; border-radius: 16px; font-size: 15px; font-weight: 700; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-black { background: #000; color: #fff; width: calc(100% - 40px); max-width: 350px; margin: 20px auto; }
        .btn-black:active { transform: scale(0.98); opacity: 0.9; }
        
        /* ОКНО СОЗДАНИЯ: ОБНОВЛЕННЫЕ ПОЛЯ */
        .full-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 5000; display: none; flex-direction: column; overflow-y: auto; padding: 25px; box-sizing: border-box; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 11px; font-weight: 800; color: #999; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-group input { width: 100%; padding: 14px; border: 1px solid #eee; border-radius: 12px; box-sizing: border-box; font-size: 16px; background: #f9f9f9; outline: none; }
        
        .project-card { border: 1px solid #eee; border-radius: 18px; padding: 20px; margin-bottom: 12px; background: #fff; width: 100%; max-width: 350px; box-sizing: border-box; }
        hr { border: 0; border-top: 1px solid #f2f2f2; margin: 10px 0 25px 0; }
    </style>
</head>
<body>

<div id="mainView">
    <div class="header-sticky">
        <h2>Локации</h2>
        <div class="tabs">
            <div id="t-active" class="tab active" data-tab="active" onclick="switchTab('active')">Активные</div>
            <div id="t-hidden" class="tab" data-tab="hidden" onclick="switchTab('hidden')">Скрытые</div>
            <div id="t-trash" class="tab" data-tab="trash" onclick="switchTab('trash')" oncontextmenu="handleTrashContext(event)">Корзина</div>
        </div>
    </div>
    
    <button id="addBtn" class="btn-base btn-black" onclick="openCreateModal()">+ Создать план</button>
    <div id="projectList" style="padding: 10px 20px; display: flex; flex-direction: column; align-items: center;"></div>
</div>

<!-- ОБНОВЛЕННОЕ ОКНО СОЗДАНИЯ -->
<div id="createModal" class="full-modal">
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
        <h2 style="margin:0; font-size: 24px;"><b>Что планируем</b></h2>
        <button onclick="closeCreateModal()" style="background:#f5f5f5; border:none; width: 36px; height: 36px; border-radius: 50%; font-size: 18px; display: flex; align-items: center; justify-content: center;">✕</button>
    </div>

    <div class="form-group">
        <label>Название проекта</label>
        <input type="text" id="f-title" placeholder="Название съемки">
    </div>

    <div class="form-group">
        <label>Дата</label>
        <input type="date" id="f-date">
    </div>

    <hr>

    <div class="form-group">
        <label>Место сбора (Адрес)</label>
        <input type="text" id="f-meeting-address" placeholder="Например: Кутузовский пр-т, 1">
    </div>

    <div class="form-group">
        <label>Ссылка на карту</label>
        <input type="url" id="f-meeting-link" placeholder="Вставьте ссылку Google/Yandex">
    </div>

    <div style="display:flex; gap:12px;">
        <div class="form-group" style="flex:1">
            <label>Время сбора</label>
            <input type="time" id="f-time-arrival">
        </div>
        <div class="form-group" style="flex:1">
            <label>Время выезда</label>
            <input type="time" id="f-time-departure">
        </div>
    </div>

    <div class="form-group">
        <label>Заметки для группы</label>
        <input type="text" id="f-notes" placeholder="Одевайтесь теплее, сменная обувь...">
    </div>

    <button class="btn-base btn-black" style="width:100%; margin-top: 10px;" onclick="saveNewPlan()">Сохранить план</button>
</div>

<script>
    const SUPABASE_URL = 'https://ndgkvnuyngwhecyqsdbp.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_7o_wxB527BROaf9QKHxcnw_5B7rUUn-';
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const tg = window.Telegram.WebApp;
    const uid = tg.initDataUnsafe?.user?.id?.toString() || "demo";

    let currentTab = 'active';

    function openCreateModal() { 
        document.getElementById('createModal').style.display = 'flex'; 
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
    }
    function closeCreateModal() { document.getElementById('createModal').style.display = 'none'; }

    // ОБНОВЛЕННАЯ ФУНКЦИЯ СОХРАНЕНИЯ
    async function saveNewPlan() {
        const title = document.getElementById('f-title').value;
        if (!title) return tg.showAlert("Введите название!");

        const planData = {
            user_id: uid,
            title: title,
            date_scout: document.getElementById('f-date').value,
            meeting_point: document.getElementById('f-meeting-address').value,
            meeting_link: document.getElementById('f-meeting-link').value,
            time_arrival: document.getElementById('f-time-arrival').value,
            time_departure: document.getElementById('f-time-departure').value,
            notes: document.getElementById('f-notes').value,
            status: 'active'
        };

        const { error } = await client.from('projects').insert([planData]);

        if (!error) {
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            // Сброс полей
            document.getElementById('f-title').value = '';
            document.getElementById('f-meeting-address').value = '';
            document.getElementById('f-meeting-link').value = '';
            document.getElementById('f-notes').value = '';
            
            closeCreateModal();
            loadProjects();
        } else {
            tg.showAlert("Ошибка: " + error.message);
        }
    }

    async function loadProjects() {
        const { data } = await client.from('projects').select('*').eq('user_id', uid).eq('status', currentTab).order('created_at', {ascending: false});
        const list = document.getElementById('projectList');
        list.innerHTML = (data || []).map(p => `
            <div class="project-card">
                <div style="font-weight:800; font-size:17px;">${p.title}</div>
                <div style="font-size:13px; color:#777; margin-top:8px;">🗓 ${p.date_scout || 'Дата не указана'}</div>
            </div>
        `).join('');
    }

    function switchTab(t) {
        currentTab = t;
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        document.getElementById(`t-${t}`).classList.add('active');
        document.getElementById('addBtn').style.display = (t === 'active') ? 'flex' : 'none';
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('soft');
        loadProjects();
    }

    function handleTrashContext(e) {
        e.preventDefault();
        tg.showActionSheet({
            title: 'Управление корзиной',
            buttons: [{ text: 'Очистить всю корзину', type: 'destructive' }]
        }, async (index) => {
            if (index === 0) {
                await client.from('projects').delete().eq('user_id', uid).eq('status', 'trash');
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                loadProjects();
            }
        });
    }

    loadProjects();
</script>
</body>
</html>
