<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background: #fff; margin: 0; padding: 0; color: #000; 
            -webkit-tap-highlight-color: transparent; 
            -webkit-touch-callout: none; 
            user-select: none; 
            overflow-x: hidden;
        }
        
        /* Шапка */
        .header-sticky { position: sticky; top: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); z-index: 1000; padding: 20px 25px; border-bottom: 1px solid #f2f2f2; text-align: center; }
        h2 { margin: 0 0 15px 0; font-size: 20px; font-weight: 800; }
        .tabs { display: flex; justify-content: center; gap: 8px; }
        .tab { font-size: 13px; font-weight: 700; color: #999; padding: 10px 16px; border-radius: 12px; cursor: pointer; background: #f5f5f5; border: none; transition: all 0.3s ease; }
        .tab.active[data-tab="active"] { background: #000 !important; color: #fff; }
        .tab.active[data-tab="hidden"] { background: #8e8e93 !important; color: #fff; }
        .tab.active[data-tab="trash"] { background: #ff3b30 !important; color: #fff; }

        .btn-base { height: 54px; border-radius: 16px; font-size: 16px; font-weight: 800; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease; }
        .btn-black { background: #000; color: #fff; width: calc(100% - 40px); max-width: 350px; margin: 20px auto; }
        
        /* Карточки */
        .project-card { 
            border: 1px solid #eee; border-radius: 20px; padding: 20px; margin-bottom: 12px; background: #fff; 
            width: 100%; max-width: 350px; box-sizing: border-box; position: relative; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; align-items: center; gap: 15px; cursor: pointer;
        }
        .project-card.selected { border-color: #000; background: #f9f9f9; transform: scale(0.96); opacity: 0.8; }
        
        .checkbox { 
            width: 20px; height: 20px; border: 2px solid #ddd; border-radius: 6px; 
            display: none; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s;
        }
        .checkbox.visible { display: flex; animation: fadeIn 0.2s ease; }
        .project-card.selected .checkbox { background: #000; border-color: #000; }
        .project-card.selected .checkbox::after { content: '✓'; color: #fff; font-size: 12px; font-weight: 900; }

        /* Анимированное меню действий */
        #actionMenu { 
            position: fixed; bottom: -120px; left: 0; width: 100%; background: #000; 
            padding: 25px 20px 40px 20px; box-sizing: border-box; display: flex; justify-content: space-around; 
            align-items: center; z-index: 9999; 
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
            border-radius: 30px 30px 0 0; color: #fff;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.2);
        }
        #actionMenu.show { transform: translateY(-120px); }
        
        .action-item { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; transition: opacity 0.2s; min-width: 60px; }
        .action-item:active { opacity: 0.5; }
        .action-icon { font-size: 22px; font-weight: 300; line-height: 1; }
        .action-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; }

        /* Модалка */
        .full-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 5000; display: none; flex-direction: column; overflow-y: auto; padding: 25px; box-sizing: border-box; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 11px; font-weight: 900; color: #999; margin-bottom: 8px; text-transform: uppercase; }
        .form-group input { width: 100%; padding: 16px; border: 1px solid #f2f2f2; border-radius: 14px; box-sizing: border-box; font-size: 16px; background: #f9f9f9; outline: none; font-weight: 700; transition: border 0.2s; }
        .form-group input:focus { border-color: #000; background: #fff; }
        
        #devPanel { position: fixed; bottom: 5px; right: 10px; opacity: 0.2; font-size: 9px; z-index: 100; font-family: monospace; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="mainView">
    <div class="header-sticky">
        <h2 id="pageTitle">ЛОКАЦИИ</h2>
        <div class="tabs">
            <div id="t-active" class="tab active" data-tab="active" onclick="switchTab('active')">ПЛАНЫ</div>
            <div id="t-hidden" class="tab" data-tab="hidden" onclick="switchTab('hidden')">АРХИВ</div>
            <div id="t-trash" class="tab" data-tab="trash" onclick="switchTab('trash')">УДАЛЕННЫЕ</div>
        </div>
    </div>
    <button id="addBtn" class="btn-base btn-black" onclick="openModal()">+ НОВЫЙ ПРОЕКТ</button>
    <div id="projectList" style="padding: 10px 20px; display: flex; flex-direction: column; align-items: center; padding-bottom: 160px;"></div>
</div>

<!-- Минималистичное меню действий -->
<div id="actionMenu">
    <div class="action-item" onclick="cancelSelection()">
        <div class="action-icon">×</div>
        <div class="action-label">ОТМЕНА</div>
    </div>
    <div id="hideAction" class="action-item" onclick="applyBulkStatus('hidden')">
        <div class="action-icon">−</div>
        <div class="action-label">СКРЫТЬ</div>
    </div>
    <div id="restoreAction" class="action-item" onclick="applyBulkStatus('active')" style="display:none;">
        <div class="action-icon">+</div>
        <div class="action-label">ВЕРНУТЬ</div>
    </div>
    <div id="trashAction" class="action-item" onclick="applyBulkStatus('trash')">
        <div class="action-icon">!</div>
        <div class="action-label">В КОРЗИНУ</div>
    </div>
    <div id="deleteAction" class="action-item" onclick="deleteForever()" style="display:none; color:#ff3b30;">
        <div class="action-icon">×</div>
        <div class="action-label">УДАЛИТЬ</div>
    </div>
</div>

<div id="createModal" class="full-modal">
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <h2 id="modalHeader" style="margin:0; font-size: 24px;">РЕДАКТИРОВАТЬ</h2>
        <button onclick="closeModal()" style="background:#f5f5f5; border:none; width: 40px; height: 40px; border-radius: 50%; font-size: 20px;">×</button>
    </div>
    <input type="hidden" id="f-id">
    <div class="form-group"><label>Название</label><input type="text" id="f-title" placeholder="Film Location X"></div>
    <div class="form-group"><label>Дата (ДД.ММ)</label><input type="text" id="f-date" maxlength="5" inputmode="numeric"></div>
    <div class="form-group"><label>Адрес / Точка</label><input type="text" id="f-meeting-address" placeholder="ул. Примерная, 1"></div>
    <div class="form-group"><label>Заметки</label><input type="text" id="f-notes" placeholder="Код от шлагбаума и т.д."></div>
    <button class="btn-base btn-black" style="width:100%; margin-top: 10px;" onclick="processSave()">СОХРАНИТЬ</button>
</div>

<div id="devPanel">V1.2.0 | <span onclick="location.reload()" style="cursor:pointer">RELOAD</span></div>

<script>
    const SUPABASE_URL = 'https://ndgkvnuyngwhecyqsdbp.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_7o_wxB527BROaf9QKHxcnw_5B7rUUn-';
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const tg = window.Telegram.WebApp;
    const uid = tg.initDataUnsafe?.user?.id?.toString() || "demo";

    let currentTab = 'active';
    let projects = [];
    let selectedIds = new Set();
    let isSelectionMode = false;
    let longPressTimer;

    async function loadProjects() {
        const { data } = await client.from('projects').select('*').eq('user_id', uid).eq('status', currentTab).order('created_at', {ascending: false});
        projects = data || [];
        renderProjects();
    }

    function renderProjects() {
        const list = document.getElementById('projectList');
        list.innerHTML = projects.map(p => `
            <div class="project-card ${selectedIds.has(p.id) ? 'selected' : ''}" 
                 onclick="handleCardClick('${p.id}')"
                 onmousedown="handleMouseDown(event, '${p.id}')"
                 onmouseup="handleMouseUp()"
                 ontouchstart="handleTouchStart(event, '${p.id}')"
                 ontouchend="handleTouchEnd()"
                 oncontextmenu="handleContextMenu(event, '${p.id}')">
                <div class="checkbox ${isSelectionMode ? 'visible' : ''}"></div>
                <div class="project-info" style="flex:1">
                    <div style="font-weight:900; font-size:16px; letter-spacing: -0.5px;">${p.title.toUpperCase()}</div>
                    <div style="font-size:12px; color:#aaa; margin-top:6px; font-weight:600;">${p.date_scout || '--.--'} • ${p.meeting_point || 'НЕТ АДРЕСА'}</div>
                </div>
            </div>
        `).join('');
        updateActionMenu();
    }

    function handleCardClick(id) {
        if (isSelectionMode) toggleSelect(id);
        else openModal(projects.find(p => p.id == id));
    }

    function handleContextMenu(e, id) { e.preventDefault(); if (!isSelectionMode) { isSelectionMode = true; toggleSelect(id); } }
    function handleMouseDown(e, id) { if(e.button === 0) startTimer(id); }
    function handleMouseUp() { clearTimer(); }
    function handleTouchStart(e, id) { startTimer(id); }
    function handleTouchEnd() { clearTimer(); }

    function startTimer(id) {
        clearTimer();
        longPressTimer = setTimeout(() => {
            if (!isSelectionMode) {
                isSelectionMode = true;
                tg.HapticFeedback.impactOccurred('heavy');
                toggleSelect(id);
            }
        }, 600);
    }
    function clearTimer() { clearTimeout(longPressTimer); }

    function toggleSelect(id) {
        if (selectedIds.has(id)) selectedIds.delete(id);
        else { selectedIds.add(id); tg.HapticFeedback.impactOccurred('light'); }
        if (selectedIds.size === 0) isSelectionMode = false;
        renderProjects();
    }

    function cancelSelection() { isSelectionMode = false; selectedIds.clear(); renderProjects(); }

    function updateActionMenu() {
        const menu = document.getElementById('actionMenu');
        if (isSelectionMode && selectedIds.size > 0) {
            menu.classList.add('show');
            document.getElementById('hideAction').style.display = (currentTab === 'active') ? 'flex' : 'none';
            document.getElementById('restoreAction').style.display = (currentTab !== 'active') ? 'flex' : 'none';
            document.getElementById('trashAction').style.display = (currentTab !== 'trash') ? 'flex' : 'none';
            document.getElementById('deleteAction').style.display = (currentTab === 'trash') ? 'flex' : 'none';
        } else {
            menu.classList.remove('show');
        }
    }

    async function applyBulkStatus(newStatus) {
        await client.from('projects').update({ status: newStatus }).in('id', Array.from(selectedIds));
        tg.HapticFeedback.notificationOccurred('success');
        cancelSelection(); loadProjects();
    }

    async function deleteForever() {
        tg.showConfirm("УДАЛИТЬ НАВСЕГДА?", async (ok) => {
            if (ok) {
                await client.from('projects').delete().in('id', Array.from(selectedIds));
                cancelSelection(); loadProjects();
            }
        });
    }

    function openModal(p) {
        document.getElementById('f-id').value = p.id;
        document.getElementById('f-title').value = p.title;
        document.getElementById('f-date').value = p.date_scout;
        document.getElementById('f-meeting-address').value = p.meeting_point;
        document.getElementById('f-notes').value = p.notes;
        document.getElementById('createModal').style.display = 'flex';
    }
    function closeModal() { document.getElementById('createModal').style.display = 'none'; }

    async function processSave() {
        const data = {
            title: document.getElementById('f-title').value,
            date_scout: document.getElementById('f-date').value,
            meeting_point: document.getElementById('f-meeting-address').value,
            notes: document.getElementById('f-notes').value
        };
        await client.from('projects').update(data).eq('id', document.getElementById('f-id').value);
        closeModal(); loadProjects();
    }

    function switchTab(t) {
        currentTab = t; cancelSelection();
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        document.getElementById(`t-${t}`).classList.add('active');
        loadProjects();
    }

    loadProjects();
    tg.expand();
</script>
</body>
</html>
