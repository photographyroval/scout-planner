<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #fff; margin: 0; padding: 0; color: #000; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .version-tag { position: fixed; top: 8px; right: 8px; background: rgba(0,0,0,0.6); color: #fff; padding: 4px 8px; border-radius: 8px; font-size: 10px; z-index: 10001; pointer-events: none; }
        
        .header-sticky { position: sticky; top: 0; background: #fff; z-index: 1000; padding: 25px 20px 15px 20px; border-bottom: 1px solid #f2f2f2; text-align: center; }
        h2 { font-size: 20px; margin: 0 0 20px 0; font-weight: 800; }
        
        .tabs { display: flex; justify-content: center; gap: 12px; margin-bottom: 15px; }
        .tab { font-size: 13px; font-weight: 700; color: #999; padding: 8px 16px; border-radius: 12px; cursor: pointer; background: #f5f5f5; border: none; transition: 0.2s; }
        .tab.active { background: #34c759; color: #fff; transform: scale(1.1); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .tab[data-tab="hidden"].active { background: #8e8e93; }
        .tab[data-tab="trash"].active { background: #ff3b30; }

        .container { padding: 20px; display: flex; flex-direction: column; align-items: center; width: 100%; box-sizing: border-box; }
        .btn-black { background: #000; color: #fff; border: none; padding: 18px; border-radius: 16px; width: 100%; max-width: 350px; font-weight: 700; font-size: 16px; cursor: pointer; margin-top: 10px; }
        
        .input-group { margin-bottom: 20px; width: 100%; max-width: 350px; }
        .input-label { font-size: 13px; color: #888; margin-bottom: 8px; display: block; text-align: left; }
        .main-input { width: 100%; padding: 14px; border: 1px solid #efefef; border-radius: 12px; font-size: 16px; box-sizing: border-box; outline: none; background: #f9f9f9; font-weight: 600; }

        .project-card { border: 1px solid #eee; border-radius: 18px; padding: 18px; margin-bottom: 12px; display: flex; align-items: center; width: 100%; max-width: 350px; box-sizing: border-box; cursor: pointer; }
        .location-block { background: #fcfcfc; border: 1px solid #eee; border-radius: 20px; padding: 18px; margin-bottom: 15px; width: 100%; max-width: 350px; box-sizing: border-box; }
        .nav-bar { display: flex; justify-content: space-between; padding: 12px 20px; border-bottom: 1px solid #f9f9f9; align-items: center; }
        .nav-btn { background: none; border: none; font-size: 16px; cursor: pointer; font-weight: 600; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="version-tag">v. Rollback (Fixed UI)</div>

<div id="mainView">
    <div class="header-sticky">
        <h2>Мои Проекты</h2>
        <div class="tabs">
            <div id="t-active" class="tab active" data-tab="active" onclick="switchTab('active')">Активные</div>
            <div id="t-hidden" class="tab" data-tab="hidden" onclick="switchTab('hidden')">Скрытые</div>
            <div id="t-trash" class="tab" data-tab="trash" onclick="switchTab('trash')">Корзина</div>
        </div>
        <button class="btn-black" onclick="createNewProject()">+ Создать план</button>
    </div>
    <div class="container" id="projectList"></div>
</div>

<div id="editorView" class="hidden">
    <div class="nav-bar">
        <button class="nav-btn" onclick="showView('mainView')" style="color: #007aff;">← Отмена</button>
        <button class="nav-btn" onclick="showView('locationView')" style="color: #34c759;">Далее</button>
    </div>
    <div class="container">
        <h3>Общее</h3>
        <div class="input-group">
            <span class="input-label">Название проекта</span>
            <input type="text" id="pTitle" class="main-input">
        </div>
        <div class="input-group">
            <span class="input-label">Дата (дд.мм)</span>
            <input type="text" id="pDate" class="main-input date-mask" placeholder="01.05">
        </div>
    </div>
</div>

<div id="locationView" class="hidden">
    <div class="nav-bar">
        <button class="nav-btn" onclick="showView('editorView')" style="color: #007aff;">← Назад</button>
        <button class="nav-btn" onclick="showView('planView')" style="color: #34c759;">Далее</button>
    </div>
    <div class="container">
        <h3>Сбор и Выезд</h3>
        <div style="display:flex; gap:10px; width:100%; max-width:350px; margin-bottom:15px;">
            <input type="text" id="pTime" class="main-input time-mask" placeholder="Сбор (чч:мм)">
            <input type="text" id="pExitTime" class="main-input time-mask" placeholder="Выезд (чч:мм)">
        </div>
        <input type="text" id="pAddress" class="main-input" placeholder="Адрес сбора" style="margin-bottom:15px;">
        <input type="text" id="pMapUrl" class="main-input" placeholder="Ссылка на карту">
    </div>
</div>

<div id="planView" class="hidden">
    <div class="nav-bar">
        <button class="nav-btn" onclick="showView('locationView')" style="color: #007aff;">← Назад</button>
        <button class="nav-btn" id="btnFinalSave" onclick="saveEverything()" style="color: #34c759;">СОХРАНИТЬ</button>
    </div>
    <div class="container">
        <h3>Локации</h3>
        <div id="locationsList" style="width:100%;"></div>
        <button class="btn-black" onclick="addLocationBlock()" style="background:#f2f2f2; color:#000;">+ Добавить точку</button>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://ndgkvnuyngwhecyqsdbp.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_7o_wxB527BROaf9QKHxcnw_5B7rUUn-';
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const tg = window.Telegram.WebApp;
    const uid = tg.initDataUnsafe?.user?.id?.toString() || "demo";

    let currentEditId = null;
    let locations = [];
    let currentTab = 'active';

    function initMasks() {
        document.querySelectorAll('.date-mask').forEach(el => {
            el.oninput = (e) => {
                let v = e.target.value.replace(/\D/g, '').substring(0,4);
                if (v.length >= 2) v = v.substring(0,2) + '.' + v.substring(2);
                e.target.value = v;
            };
        });
        document.querySelectorAll('.time-mask').forEach(el => {
            el.oninput = (e) => {
                let v = e.target.value.replace(/\D/g, '').substring(0,4);
                if (v.length >= 2) v = v.substring(0,2) + ':' + v.substring(2);
                e.target.value = v;
            };
        });
    }

    function showView(v) {
        document.querySelectorAll('body > div[id]').forEach(d => d.classList.add('hidden'));
        document.getElementById(v).classList.remove('hidden');
        if (v === 'mainView') loadProjects();
        initMasks();
    }

    async function loadProjects() {
        const { data } = await client.from('projects').select('*').eq('user_id', uid).eq('status', currentTab).order('created_at', {ascending: false});
        const list = document.getElementById('projectList');
        list.innerHTML = data?.length ? data.map(p => `
            <div class="project-card" onclick="openEdit('${p.id}')">
                <div style="flex:1;">
                    <div style="font-weight:800; font-size:17px;">${p.title}</div>
                    <div style="font-size:13px; color:#888;">🗓 ${p.date_scout || '...'}</div>
                </div>
                <div style="color:#ddd;">›</div>
            </div>
        `).join('') : '<p style="color:#bbb; margin-top:40px;">Пусто</p>';
    }

    async function saveEverything() {
        const btn = document.getElementById('btnFinalSave');
        const title = document.getElementById('pTitle').value.trim();
        if (!title) return alert("Введите название");

        btn.disabled = true;
        btn.innerText = "⏳...";

        const row = {
            user_id: uid,
            title: title,
            date_scout: document.getElementById('pDate').value,
            meeting_time: document.getElementById('pTime').value,
            exit_time: document.getElementById('pExitTime').value,
            meeting_address: document.getElementById('pAddress').value,
            map_url: document.getElementById('pMapUrl').value,
            plan_data: { points: locations },
            status: 'active'
        };

        if (currentEditId) row.id = currentEditId;

        try {
            const { error } = await client.from('projects').upsert(row);
            if (error) throw error;
            showView('mainView');
        } catch (e) {
            alert("Ошибка БД: " + e.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "СОХРАНИТЬ";
        }
    }

    async function openEdit(id) {
        const { data } = await client.from('projects').select('*').eq('id', id).single();
        if (data) {
            currentEditId = data.id;
            document.getElementById('pTitle').value = data.title || '';
            document.getElementById('pDate').value = data.date_scout || '';
            document.getElementById('pTime').value = data.meeting_time || '';
            document.getElementById('pExitTime').value = data.exit_time || '';
            document.getElementById('pAddress').value = data.meeting_address || '';
            document.getElementById('pMapUrl').value = data.map_url || '';
            locations = data.plan_data?.points || [];
            renderLocations();
            showView('editorView');
        }
    }

    function addLocationBlock() {
        const id = Date.now();
        locations.push({ id, name: '', time: '' });
        renderLocations();
    }

    function renderLocations() {
        const container = document.getElementById('locationsList');
        container.innerHTML = locations.map(l => `
            <div class="location-block">
                <input type="text" class="main-input" placeholder="Название точки" value="${l.name}" onchange="updateLoc(${l.id}, 'name', this.value)" style="margin-bottom:8px;">
                <input type="text" class="main-input time-mask" placeholder="Время чч:мм" value="${l.time}" onchange="updateLoc(${l.id}, 'time', this.value)">
            </div>
        `).join('');
        initMasks();
    }

    function updateLoc(id, field, val) {
        const loc = locations.find(l => l.id === id);
        if (loc) loc[field] = val;
    }

    function switchTab(t) {
        currentTab = t;
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        document.querySelector(`.tab[data-tab="${t}"]`).classList.add('active');
        loadProjects();
    }

    function createNewProject() {
        currentEditId = null; locations = [];
        document.querySelectorAll('input').forEach(i => i.value = '');
        renderLocations();
        showView('editorView');
    }

    loadProjects();
    initMasks();
</script>
</body>
</html>
