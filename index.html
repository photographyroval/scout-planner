<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #fff; margin: 0; padding: 0; color: #000; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .version-tag { position: fixed; top: 8px; right: 8px; background: rgba(0,0,0,0.6); color: #fff; padding: 4px 8px; border-radius: 8px; font-size: 10px; z-index: 10001; pointer-events: none; font-weight: 600; }
        
        .header-sticky { position: sticky; top: 0; background: #fff; z-index: 1000; padding: 25px 20px 15px 20px; border-bottom: 1px solid #f2f2f2; text-align: center; }
        .reload-btn { position: absolute; left: 15px; top: 28px; background: none; border: none; font-size: 20px; cursor: pointer; padding: 5px; opacity: 0.6; }
        
        h2 { font-size: 20px; margin: 0 0 20px 0; font-weight: 800; }
        
        .tabs { display: flex; justify-content: center; gap: 12px; margin-bottom: 15px; align-items: center; height: 50px; }
        .tab { font-size: 13px; font-weight: 700; color: #999; padding: 8px 16px; border-radius: 12px; cursor: pointer; transition: all 0.3s ease; background: #f5f5f5; border: none; }
        .tab.active { transform: scale(1.1); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .tab[data-tab="active"].active { background: #34c759; color: #fff; }
        .tab[data-tab="hidden"].active { background: #8e8e93; color: #fff; }
        .tab[data-tab="trash"].active { background: #ff3b30; color: #fff; }

        .container { padding: 20px; display: flex; flex-direction: column; align-items: center; width: 100%; box-sizing: border-box; }
        .btn-black { background: #000; color: #fff; border: none; padding: 18px; border-radius: 16px; width: 100%; max-width: 350px; font-weight: 700; font-size: 16px; cursor: pointer; display: block; margin: 0 auto; }
        
        /* Стили карточки */
        .project-card { border: 1px solid #eee; border-radius: 18px; padding: 18px; margin-bottom: 12px; display: flex; flex-direction: column; width: 100%; max-width: 350px; box-sizing: border-box; position: relative; }
        .list-tag { font-size: 9px; padding: 2px 6px; border-radius: 6px; color: #fff; font-weight: 700; text-transform: uppercase; display: inline-block; opacity: 0.8; }
        
        /* Троеточие и меню */
        .card-menu-btn { position: absolute; top: 10px; right: 10px; font-size: 20px; padding: 10px; cursor: pointer; color: #ccc; }
        .dropdown-menu { position: absolute; top: 40px; right: 10px; background: #fff; border: 1px solid #eee; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); z-index: 100; display: none; overflow: hidden; }
        .dropdown-menu.show { display: block; }
        .menu-item { padding: 12px 20px; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; }
        .menu-item:active { background: #f5f5f5; }
        .menu-item.delete { color: #ff3b30; }

        /* Инпуты */
        .input-group { margin-bottom: 20px; width: 100%; max-width: 350px; }
        .input-label { font-size: 13px; color: #888; margin-bottom: 8px; display: block; font-weight: 500; text-align: left; }
        .main-input { width: 100%; padding: 14px; border: 1px solid #efefef; border-radius: 12px; font-size: 16px; font-weight: 600; box-sizing: border-box; outline: none; background: #f9f9f9; color: #000; }

        .location-block { background: #fcfcfc; border: 1px solid #eee; border-radius: 20px; padding: 15px; margin-bottom: 20px; width: 100%; max-width: 350px; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; border-bottom: 1px solid #f9f9f9; }
        .nav-btn { background: none; border: none; font-size: 16px; cursor: pointer; font-weight: 600; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="version-tag">v. 01.05 MENU</div>

<div id="mainView">
    <div class="header-sticky">
        <button class="reload-btn" onclick="window.location.reload()">🔄</button>
        <h2>Мои Проекты</h2>
        <div class="tabs">
            <div id="t-active" class="tab active" data-tab="active" onclick="switchTab('active')">Активные</div>
            <div id="t-hidden" class="tab" data-tab="hidden" onclick="switchTab('hidden')">🙈 Скрытые</div>
            <div id="t-trash" class="tab" data-tab="trash" onclick="switchTab('trash')">Корзина</div>
        </div>
        <button id="addBtn" class="btn-black" onclick="createNewProject()">+ Создать план</button>
    </div>
    <div class="container" id="projectList"></div>
</div>

<!-- Остальные View остаются без изменений, но убедитесь, что они есть в вашем файле -->
<div id="editorView" class="hidden">
    <div class="nav-bar">
        <button class="nav-btn" onclick="showView('mainView')" style="color: #007aff;">← Отмена</button>
        <button class="nav-btn" onclick="showView('locationView')" style="color: #34c759;">Далее</button>
    </div>
    <div class="container">
        <h3 style="font-size: 24px; font-weight: 800; width: 100%;">Что планируем?</h3>
        <div class="input-group">
            <span class="input-label">Название проекта</span>
            <input type="text" id="pTitle" class="main-input" placeholder="Напр: Съемка клипа">
        </div>
        <div class="input-group">
            <span class="input-label">Когда</span>
            <input type="text" id="pDate" class="main-input date-mask" placeholder="дд.мм" inputmode="numeric">
        </div>
        <div class="input-group">
            <span class="input-label">Тег</span>
            <input type="text" id="pTagText" class="main-input" placeholder="#" maxlength="12">
        </div>
    </div>
</div>

<!-- GATHERING VIEW -->
<div id="locationView" class="hidden">
    <div class="nav-bar">
        <button class="nav-btn" onclick="showView('editorView')" style="color: #007aff;">← Назад</button>
        <button class="nav-btn" onclick="saveAndGoToPlan()" style="color: #34c759;">Сохранить и далее</button>
    </div>
    <div class="container">
        <h3 style="font-size: 24px; font-weight: 800; width: 100%;">Сбор</h3>
        <div style="display: flex; gap: 10px; width: 100%; max-width: 350px;">
            <div class="input-group">
                <span class="input-label">Сбор</span>
                <input type="text" id="pTime" class="main-input time-mask" placeholder="09:00">
            </div>
            <div class="input-group">
                <span class="input-label">Выезд</span>
                <input type="text" id="pExitTime" class="main-input time-mask" placeholder="10:00">
            </div>
        </div>
        <div class="input-group">
            <span class="input-label">Адрес сбора</span>
            <input type="text" id="pAddress" class="main-input" placeholder="Улица, дом...">
        </div>
    </div>
</div>

<!-- FINAL PLAN VIEW -->
<div id="planView" class="hidden">
    <div class="nav-bar">
        <button class="nav-btn" onclick="showView('locationView')" style="color: #007aff;">← Назад</button>
        <button class="nav-btn" onclick="finalSaveAll()" style="color: #34c759; font-weight:800;">ГОТОВО</button>
    </div>
    <div class="container">
        <h3 style="font-size: 24px; font-weight: 800; width: 100%;">Локации</h3>
        <div id="locationsList" style="width: 100%;"></div>
        <button class="add-loc-btn" onclick="addLocationBlock()">+ Добавить локацию</button>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://ndgkvnuyngwhecyqsdbp.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_7o_wxB527BROaf9QKHxcnw_5B7rUUn-';
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const tg = window.Telegram.WebApp;
    const uid = tg.initDataUnsafe?.user?.id?.toString() || "demo";

    let currentTab = 'active';
    let currentEditId = null;
    let locations = [];

    // Показать/скрыть меню в карточке
    function toggleMenu(e, id) {
        e.stopPropagation(); // Чтобы не открывалось редактирование
        document.querySelectorAll('.dropdown-menu').forEach(m => {
            if (m.id !== 'menu-' + id) m.classList.remove('show');
        });
        document.getElementById('menu-' + id).classList.toggle('show');
    }

    // Закрывать меню при клике в любое место
    window.onclick = () => document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('show'));

    async function changeStatus(e, id, newStatus) {
        e.stopPropagation();
        const { error } = await client.from('projects').update({ status: newStatus }).eq('id', id);
        if (!error) loadProjects();
    }

    function exportToPDF(e, id) {
        e.stopPropagation();
        alert("Генерация PDF для проекта " + id + "...\n(Функция в разработке)");
    }

    async function loadProjects() {
        const { data, error } = await client.from('projects').select('*').eq('user_id', uid).eq('status', currentTab).order('created_at', {ascending: false});
        const list = document.getElementById('projectList');
        if (error) return list.innerHTML = 'Ошибка';
        
        list.innerHTML = data?.length ? data.map(p => {
            const c = p.content || {};
            const locCount = c.locations ? c.locations.length : 0;
            const startTime = c.meeting_time || '..:..';
            let endTime = c.exit_time || '..:..';
            if (locCount > 0 && c.locations[locCount - 1].time_start) endTime = c.locations[locCount - 1].time_start;

            return `
                <div class="project-card" onclick="openEdit('${p.id}')">
                    <div class="card-menu-btn" onclick="toggleMenu(event, '${p.id}')">⋮</div>
                    <div id="menu-${p.id}" class="dropdown-menu">
                        <div class="menu-item" onclick="changeStatus(event, '${p.id}', 'hidden')">🙈 Скрыть</div>
                        <div class="menu-item" onclick="exportToPDF(event, '${p.id}')">📄 PDF</div>
                        <div class="menu-item delete" onclick="changeStatus(event, '${p.id}', 'trash')">🗑 Удалить</div>
                    </div>

                    <div style="font-weight:800; font-size:18px; margin-bottom: 4px; padding-right: 20px;">${p.title}</div>
                    <div style="font-size:13px; color:#666; margin-bottom: 8px; display: flex; gap: 10px;">
                        <span>🗓 ${p.date_scout || '...'}</span>
                        <span>🕒 ${startTime} — ${endTime}</span>
                    </div>
                    <div style="font-size:12px; color:#999; margin-bottom: 10px;">📍 Локаций: ${locCount}</div>
                    ${p.tags ? `<div class="list-tag" style="background:${(c.tag_color) || '#8e8e93'}">${p.tags}</div>` : ''}
                </div>
            `;
        }).join('') : '<p style="color:#bbb; margin-top:40px;">Нет проектов</p>';
    }

    // Все остальные функции (saveAndGoToPlan, openEdit и т.д.) из предыдущих версий должны быть здесь
    // Я сократил их для краткости, но в твоем файле они должны быть полными.
    
    async function saveAndGoToPlan() {
        const title = document.getElementById('pTitle').value.trim();
        if (!title) return alert("Введите название");
        const payload = {
            user_id: uid,
            title: title,
            date_scout: document.getElementById('pDate').value,
            tags: document.getElementById('pTagText').value,
            content: { 
                meeting_time: document.getElementById('pTime').value,
                exit_time: document.getElementById('pExitTime').value,
                location_address: document.getElementById('pAddress').value,
                locations: locations 
            },
            status: 'active'
        };
        const { data, error } = await client.from('projects').upsert({ id: currentEditId || undefined, ...payload }).select();
        if (!error) { currentEditId = data[0].id; showView('planView'); }
    }

    async function finalSaveAll() {
        const { error } = await client.from('projects').update({ 
            content: { 
                meeting_time: document.getElementById('pTime').value,
                exit_time: document.getElementById('pExitTime').value,
                location_address: document.getElementById('pAddress').value,
                locations: locations 
            } 
        }).eq('id', currentEditId);
        if (!error) showView('mainView');
    }

    async function openEdit(id) {
        const { data } = await client.from('projects').select('*').eq('id', id).single();
        if (data) {
            currentEditId = data.id;
            document.getElementById('pTitle').value = data.title || '';
            document.getElementById('pDate').value = data.date_scout || '';
            document.getElementById('pTagText').value = data.tags || '';
            const c = data.content || {};
            document.getElementById('pTime').value = c.meeting_time || '';
            document.getElementById('pExitTime').value = c.exit_time || '';
            document.getElementById('pAddress').value = c.location_address || '';
            locations = c.locations || [];
            renderLocations();
            showView('editorView');
        }
    }

    function createNewProject() {
        currentEditId = null; locations = [];
        document.querySelectorAll('input').forEach(i => i.value = '');
        showView('editorView');
    }

    function showView(v) {
        document.querySelectorAll('body > div[id]').forEach(d => d.classList.add('hidden'));
        document.getElementById(v).classList.remove('hidden');
        if (v === 'mainView') loadProjects();
    }

    function switchTab(t) {
        currentTab = t;
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        document.getElementById('t-' + t).classList.add('active');
        loadProjects();
    }

    function addLocationBlock() { locations.push({ id: Date.now(), name: '', time_start: '' }); renderLocations(); }
    function renderLocations() {
        const container = document.getElementById('locationsList');
        container.innerHTML = locations.map((l, i) => `
            <div class="location-block">
                <input type="text" class="main-input" placeholder="Название места" value="${l.name}" onchange="updateLoc(${l.id}, 'name', this.value)">
                <input type="text" class="main-input" placeholder="Время" value="${l.time_start}" onchange="updateLoc(${l.id}, 'time_start', this.value)">
            </div>
        `).join('');
    }
    function updateLoc(id, f, v) { const l = locations.find(x => x.id === id); if(l) l[f] = v; }

    loadProjects();
</script>
</body>
</html>
