<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background: #fff; margin: 0; padding: 0; color: #000; 
            -webkit-tap-highlight-color: transparent; 
            -webkit-touch-callout: none; 
            user-select: none; 
        }
        
        .header-sticky { position: sticky; top: 0; background: #fff; z-index: 1000; padding: 20px 25px; border-bottom: 1px solid #f2f2f2; text-align: center; }
        h2 { margin: 0 0 15px 0; font-size: 20px; font-weight: 800; }
        .tabs { display: flex; justify-content: center; gap: 10px; margin-top: 5px; }
        .tab { font-size: 13px; font-weight: 700; color: #999; padding: 10px 18px; border-radius: 12px; cursor: pointer; background: #f5f5f5; border: none; transition: all 0.2s ease; }
        .tab.active[data-tab="active"] { background: #34c759 !important; color: #fff; }
        .tab.active[data-tab="hidden"] { background: #8e8e93 !important; color: #fff; }
        .tab.active[data-tab="trash"] { background: #ff3b30 !important; color: #fff; }

        .btn-base { height: 54px; border-radius: 16px; font-size: 16px; font-weight: 800; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease; }
        .btn-black { background: #000; color: #fff; width: calc(100% - 40px); max-width: 350px; margin: 20px auto; }
        
        .project-card { 
            border: 1px solid #eee; border-radius: 18px; padding: 20px; margin-bottom: 12px; background: #fff; 
            width: 100%; max-width: 350px; box-sizing: border-box; position: relative; 
            transition: all 0.2s; display: flex; align-items: center; gap: 15px; cursor: pointer;
        }
        .project-card.selected { border-color: #34c759; background: #f0fff4; transform: scale(0.98); }
        
        .checkbox { 
            width: 22px; height: 22px; border: 2px solid #ddd; border-radius: 50%; 
            display: none; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .checkbox.visible { display: flex; }
        .project-card.selected .checkbox { background: #34c759; border-color: #34c759; }
        .project-card.selected .checkbox::after { content: '✓'; color: #fff; font-size: 12px; font-weight: 900; }

        /* Контекстное меню снизу */
        #actionMenu { 
            position: fixed; bottom: -100px; left: 0; width: 100%; background: #000; 
            padding: 20px; box-sizing: border-box; display: flex; justify-content: space-around; 
            align-items: center; z-index: 9999; transition: bottom 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 24px 24px 0 0; color: #fff;
        }
        #actionMenu.show { bottom: 0; }
        .action-item { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; font-size: 11px; font-weight: 700; }
        .action-item span { font-size: 20px; }

        .full-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 5000; display: none; flex-direction: column; overflow-y: auto; padding: 25px; box-sizing: border-box; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 12px; font-weight: 900; color: #000; margin-bottom: 8px; text-transform: uppercase; }
        .form-group input { width: 100%; padding: 14px; border: 1px solid #eee; border-radius: 12px; box-sizing: border-box; font-size: 16px; background: #f9f9f9; outline: none; font-weight: 800; }
        
        #devPanel { position: fixed; bottom: 5px; right: 5px; opacity: 0.3; font-size: 10px; z-index: 100; }
    </style>
</head>
<body oncontextmenu="return false;"> <!-- Отключаем системное меню везде -->

<div id="mainView">
    <div class="header-sticky">
        <h2 id="pageTitle">Проекты</h2>
        <div class="tabs">
            <div id="t-active" class="tab active" data-tab="active" onclick="switchTab('active')">Активные</div>
            <div id="t-hidden" class="tab" data-tab="hidden" onclick="switchTab('hidden')">Скрытые</div>
            <div id="t-trash" class="tab" data-tab="trash" onclick="switchTab('trash')">Корзина</div>
        </div>
    </div>
    <button id="addBtn" class="btn-base btn-black" onclick="openModal()">+ Создать проект</button>
    <div id="projectList" style="padding: 10px 20px; display: flex; flex-direction: column; align-items: center; padding-bottom: 150px;"></div>
</div>

<!-- Выпадающее меню действий -->
<div id="actionMenu">
    <div class="action-item" onclick="cancelSelection()"><span>✕</span>Отмена</div>
    <div id="hideAction" class="action-item" onclick="applyBulkStatus('hidden')"><span>👁‍🗨</span>Скрыть</div>
    <div id="restoreAction" class="action-item" onclick="applyBulkStatus('active')" style="display:none;"><span>🔄</span>Вернуть</div>
    <div id="trashAction" class="action-item" onclick="applyBulkStatus('trash')"><span>🗑</span>В корзину</div>
    <div id="deleteAction" class="action-item" onclick="deleteForever()" style="display:none; color:#ff3b30;"><span>❌</span>Удалить</div>
</div>

<!-- Модалка редактирования (без изменений структуры) -->
<div id="createModal" class="full-modal">
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
        <h2 id="modalHeader" style="margin:0;">Редактирование</h2>
        <button onclick="closeModal()" style="background:#f5f5f5; border:none; width: 36px; height: 36px; border-radius: 50%;">✕</button>
    </div>
    <input type="hidden" id="f-id">
    <div class="form-group"><label>Название</label><input type="text" id="f-title"></div>
    <div class="form-group"><label>Дата</label><input type="text" id="f-date" maxlength="5"></div>
    <div class="form-group"><label>Место</label><input type="text" id="f-meeting-address"></div>
    <div class="form-group"><label>Заметки</label><input type="text" id="f-notes"></div>
    <button class="btn-base btn-black" style="width:100%" onclick="processSave()">Сохранить</button>
</div>

<div id="devPanel">v1.1.0 | <span onclick="location.reload()">Reload</span></div>

<script>
    const SUPABASE_URL = 'https://ndgkvnuyngwhecyqsdbp.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_7o_wxB527BROaf9QKHxcnw_5B7rUUn-';
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const tg = window.Telegram.WebApp;
    const uid = tg.initDataUnsafe?.user?.id?.toString() || "demo";

    let currentTab = 'active';
    let projects = [];
    let selectedIds = new Set();
    let isSelectionMode = false;
    let longPressTimer;

    // ЗАГРУЗКА
    async function loadProjects() {
        const { data } = await client.from('projects').select('*').eq('user_id', uid).eq('status', currentTab).order('created_at', {ascending: false});
        projects = data || [];
        renderProjects();
    }

    function renderProjects() {
        const list = document.getElementById('projectList');
        list.innerHTML = projects.map(p => `
            <div class="project-card ${selectedIds.has(p.id) ? 'selected' : ''}" 
                 id="card-${p.id}"
                 onclick="handleCardClick('${p.id}')"
                 onmousedown="handleMouseDown(event, '${p.id}')"
                 onmouseup="handleMouseUp()"
                 onmouseleave="handleMouseUp()"
                 ontouchstart="handleTouchStart(event, '${p.id}')"
                 ontouchend="handleTouchEnd()"
                 oncontextmenu="handleContextMenu(event, '${p.id}')">
                <div class="checkbox ${isSelectionMode ? 'visible' : ''}"></div>
                <div class="project-info">
                    <div style="font-weight:800; font-size:17px;">${p.title}</div>
                    <div style="font-size:13px; color:#777; margin-top:4px;">${p.date_scout || '--.--'}</div>
                </div>
            </div>
        `).join('');
        updateActionMenu();
    }

    // ЛОГИКА ВЫБОРА (ПК И ТЕЛЕФОН)
    function handleCardClick(id) {
        if (isSelectionMode) {
            toggleSelect(id);
        } else {
            const p = projects.find(item => item.id == id);
            openModal(p);
        }
    }

    // Для ПК (Правая кнопка мыши)
    function handleContextMenu(e, id) {
        e.preventDefault();
        if (!isSelectionMode) {
            isSelectionMode = true;
            toggleSelect(id);
        }
    }

    // Для удержания (ПК и Телефон)
    function handleMouseDown(e, id) { if(e.button === 0) startTimer(id); }
    function handleMouseUp() { clearTimer(); }
    function handleTouchStart(e, id) { startTimer(id); }
    function handleTouchEnd() { clearTimer(); }

    function startTimer(id) {
        clearTimer();
        longPressTimer = setTimeout(() => {
            if (!isSelectionMode) {
                isSelectionMode = true;
                tg.HapticFeedback.impactOccurred('heavy');
                toggleSelect(id);
            }
        }, 600);
    }
    function clearTimer() { clearTimeout(longPressTimer); }

    function toggleSelect(id) {
        if (selectedIds.has(id)) selectedIds.delete(id);
        else selectedIds.add(id);
        
        if (selectedIds.size === 0) isSelectionMode = false;
        renderProjects();
    }

    function cancelSelection() {
        isSelectionMode = false;
        selectedIds.clear();
        renderProjects();
    }

    // МЕНЮ ДЕЙСТВИЙ
    function updateActionMenu() {
        const menu = document.getElementById('actionMenu');
        if (isSelectionMode && selectedIds.size > 0) {
            menu.classList.add('show');
            
            // Настройка кнопок в зависимости от вкладки
            document.getElementById('hideAction').style.display = (currentTab === 'active') ? 'flex' : 'none';
            document.getElementById('restoreAction').style.display = (currentTab !== 'active') ? 'flex' : 'none';
            document.getElementById('trashAction').style.display = (currentTab !== 'trash') ? 'flex' : 'none';
            document.getElementById('deleteAction').style.display = (currentTab === 'trash') ? 'flex' : 'none';
        } else {
            menu.classList.remove('show');
        }
    }

    async function applyBulkStatus(newStatus) {
        const ids = Array.from(selectedIds);
        await client.from('projects').update({ status: newStatus }).in('id', ids);
        tg.HapticFeedback.notificationOccurred('success');
        finishBulk();
    }

    async function deleteForever() {
        tg.showConfirm("Удалить безвозвратно?", async (ok) => {
            if (ok) {
                await client.from('projects').delete().in('id', Array.from(selectedIds));
                finishBulk();
            }
        });
    }

    function finishBulk() {
        cancelSelection();
        loadProjects();
    }

    // МОДАЛКА И ВКЛАДКИ
    function openModal(p) {
        document.getElementById('f-id').value = p.id;
        document.getElementById('f-title').value = p.title;
        document.getElementById('f-date').value = p.date_scout;
        document.getElementById('f-meeting-address').value = p.meeting_point;
        document.getElementById('f-notes').value = p.notes;
        document.getElementById('createModal').style.display = 'flex';
    }
    function closeModal() { document.getElementById('createModal').style.display = 'none'; }

    async function processSave() {
        const data = {
            title: document.getElementById('f-title').value,
            date_scout: document.getElementById('f-date').value,
            meeting_point: document.getElementById('f-meeting-address').value,
            notes: document.getElementById('f-notes').value
        };
        await client.from('projects').update(data).eq('id', document.getElementById('f-id').value);
        closeModal();
        loadProjects();
    }

    function switchTab(t) {
        currentTab = t;
        cancelSelection();
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        document.getElementById(`t-${t}`).classList.add('active');
        loadProjects();
    }

    loadProjects();
    tg.expand();
</script>
</body>
</html>
