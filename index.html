<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ФИКСИРОВАННЫЙ ДИЗАЙН ОСНОВНОГО ЭКРАНА */
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #fff; margin: 0; padding: 0; color: #000; -webkit-tap-highlight-color: transparent; user-select: none; }
        
        .header-sticky { position: sticky; top: 0; background: #fff; z-index: 1000; padding: 20px 25px; border-bottom: 1px solid #f2f2f2; text-align: center; }
        h2 { margin: 0 0 15px 0; font-size: 20px; font-weight: 800; }

        /* ИСПРАВЛЕННЫЕ ВКЛАДКИ (ЦВЕТА И ЛОГИКА) */
        .tabs { display: flex; justify-content: center; gap: 10px; margin-top: 5px; }
        .tab { font-size: 13px; font-weight: 700; color: #999; padding: 10px 18px; border-radius: 12px; cursor: pointer; background: #f5f5f5; border: none; transition: all 0.2s ease; }
        
        .tab.active[data-tab="active"] { background: #34c759 !important; color: #fff; }
        .tab.active[data-tab="hidden"] { background: #8e8e93 !important; color: #fff; }
        .tab.active[data-tab="trash"] { background: #ff3b30 !important; color: #fff; }

        .btn-base { height: 54px; border-radius: 16px; font-size: 16px; font-weight: 800; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease; }
        .btn-black { background: #000; color: #fff; width: calc(100% - 40px); max-width: 350px; margin: 20px auto; }
        
        /* ГЛАВНАЯ КНОПКА СОХРАНЕНИЯ */
        .btn-continue { 
            background: #34c759; 
            color: #fff; 
            width: 100%; 
            margin-top: 10px; 
            box-shadow: 0 4px 12px rgba(52, 199, 89, 0.2);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn-continue:active { transform: scale(0.97); opacity: 0.9; }

        /* МОДАЛЬНОЕ ОКНО "ЧТО ПЛАНИРУЕМ" */
        .full-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 5000; display: none; flex-direction: column; overflow-y: auto; padding: 25px; box-sizing: border-box; }
        .separator { border: 0; border-top: 2px dashed #eee; margin: 15px 0 25px 0; }

        .form-group { margin-bottom: 20px; }
        
        /* ЗАГОЛОВКИ ПОЛЕЙ: ЧЕРНЫЕ И ЖИРНЫЕ */
        .form-group label { 
            display: block; 
            font-size: 12px; 
            font-weight: 900; 
            color: #000; 
            margin-bottom: 8px; 
            text-transform: uppercase; 
            letter-spacing: 0.3px; 
        }
        
        /* ПОЛЯ ВВОДА: КОНТРАСТНЫЙ ТЕКСТ */
        .form-group input { 
            width: 100%; padding: 14px; border: 1px solid #eee; border-radius: 12px; box-sizing: border-box; 
            font-size: 16px; background: #f9f9f9; outline: none; color: #000; font-weight: 800; 
        }
        .form-group input::placeholder { color: #bbb; font-weight: 500; }

        .project-card { border: 1px solid #eee; border-radius: 18px; padding: 20px; margin-bottom: 12px; background: #fff; width: 100%; max-width: 350px; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="mainView">
    <div class="header-sticky">
        <h2>Локации</h2>
        <div class="tabs">
            <div id="t-active" class="tab active" data-tab="active" onclick="switchTab('active')">Активные</div>
            <div id="t-hidden" class="tab" data-tab="hidden" onclick="switchTab('hidden')">Скрытые</div>
            <div id="t-trash" class="tab" data-tab="trash" onclick="switchTab('trash')" oncontextmenu="handleTrashContext(event)">Корзина</div>
        </div>
    </div>
    
    <button id="addBtn" class="btn-base btn-black" onclick="openCreateModal()">+ Создать план</button>
    <div id="projectList" style="padding: 10px 20px; display: flex; flex-direction: column; align-items: center;"></div>
</div>

<div id="createModal" class="full-modal">
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
        <h2 style="margin:0; font-size: 25px;"><b>Что планируем?</b></h2>
        <button onclick="closeCreateModal()" style="background:#f5f5f5; border:none; width: 36px; height: 36px; border-radius: 50%; font-size: 18px; display: flex; align-items: center; justify-content: center;">✕</button>
    </div>

    <!-- БЛОК 1: ОСНОВА -->
    <div class="form-group">
        <label>Название проекта</label>
        <input type="text" id="f-title" placeholder="Название съемки">
    </div>

    <div class="form-group">
        <label>Дата</label>
        <input type="text" id="f-date" placeholder="дд.мм" inputmode="numeric" maxlength="5">
    </div>

    <div class="separator"></div>

    <!-- БЛОК 2: ЛОГИСТИКА -->
    <div class="form-group">
        <label>Место сбора</label>
        <input type="text" id="f-meeting-address" placeholder="Адрес локации">
    </div>

    <div class="form-group">
        <label>Ссылка на карту</label>
        <input type="url" id="f-meeting-link" placeholder="Google / Yandex">
    </div>

    <div style="display:flex; gap:12px;">
        <div class="form-group" style="flex:1">
            <label>Время сбора</label>
            <input type="text" id="f-time-arrival" placeholder="чч:мм" inputmode="numeric" maxlength="5">
        </div>
        <div class="form-group" style="flex:1">
            <label>Время выезда</label>
            <input type="text" id="f-time-departure" placeholder="чч:мм" inputmode="numeric" maxlength="5">
        </div>
    </div>

    <div class="separator"></div>

    <!-- БЛОК 3: ДОПОЛНИТЕЛЬНО -->
    <div class="form-group">
        <label>Заметки для группы</label>
        <input type="text" id="f-notes" placeholder="Что важно знать...">
    </div>

    <button class="btn-base btn-continue" onclick="saveNewPlan()">Продолжить</button>
</div>

<script>
    const SUPABASE_URL = 'https://ndgkvnuyngwhecyqsdbp.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_7o_wxB527BROaf9QKHxcnw_5B7rUUn-';
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const tg = window.Telegram.WebApp;
    const uid = tg.initDataUnsafe?.user?.id?.toString() || "demo";

    let currentTab = 'active';

    // УМНАЯ МАСКА ВВОДА С ВИБРО-ОТКЛИКОМ
    function applyMask(input, separator) {
        input.addEventListener('input', (e) => {
            let value = input.value.replace(/\D/g, '');
            if (value.length > 2) {
                value = value.slice(0, 2) + separator + value.slice(2, 4);
            }
            input.value = value;
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        });
    }

    applyMask(document.getElementById('f-date'), '.');
    applyMask(document.getElementById('f-time-arrival'), ':');
    applyMask(document.getElementById('f-time-departure'), ':');

    function openCreateModal() { 
        document.getElementById('createModal').style.display = 'flex'; 
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
    }
    
    function closeCreateModal() { document.getElementById('createModal').style.display = 'none'; }

    // СОХРАНЕНИЕ ПРОЕКТА
    async function saveNewPlan() {
        const title = document.getElementById('f-title').value;
        if (!title) return tg.showAlert("Введите название!");

        const planData = {
            user_id: uid,
            title: title,
            date_scout: document.getElementById('f-date').value,
            meeting_point: document.getElementById('f-meeting-address').value,
            meeting_link: document.getElementById('f-meeting-link').value,
            time_arrival: document.getElementById('f-time-arrival').value,
            time_departure: document.getElementById('f-time-departure').value,
            notes: document.getElementById('f-notes').value,
            status: 'active'
        };

        const { error } = await client.from('projects').insert([planData]);

        if (!error) {
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            
            // Очистка полей
            ['f-title', 'f-date', 'f-meeting-address', 'f-meeting-link', 'f-time-arrival', 'f-time-departure', 'f-notes'].forEach(id => {
                document.getElementById(id).value = '';
            });
            
            closeCreateModal();
            loadProjects();
        } else {
            tg.showAlert("Ошибка сохранения: " + error.message);
        }
    }

    // ЗАГРУЗКА ПРОЕКТОВ
    async function loadProjects() {
        const { data } = await client.from('projects').select('*').eq('user_id', uid).eq('status', currentTab).order('created_at', {ascending: false});
        const list = document.getElementById('projectList');
        list.innerHTML = (data || []).map(p => `
            <div class="project-card">
                <div style="font-weight:800; font-size:17px;">${p.title}</div>
                <div style="font-size:13px; color:#777; margin-top:8px;">🗓 ${p.date_scout || '--.--'}</div>
            </div>
        `).join('');
    }

    // ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК
    function switchTab(t) {
        currentTab = t;
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        document.getElementById(`t-${t}`).classList.add('active');
        
        document.getElementById('addBtn').style.display = (t === 'active') ? 'flex' : 'none';
        
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        loadProjects();
    }

    // УПРАВЛЕНИЕ КОРЗИНОЙ
    function handleTrashContext(e) {
        e.preventDefault();
        tg.showActionSheet({
            title: 'Управление корзиной',
            buttons: [{ text: 'Очистить всю корзину', type: 'destructive' }]
        }, async (index) => {
            if (index === 0) {
                await client.from('projects').delete().eq('user_id', uid).eq('status', 'trash');
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                loadProjects();
            }
        });
    }

    loadProjects();
</script>
</body>
</html>
