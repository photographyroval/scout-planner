<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #fff; margin: 0; padding: 0; color: #000; -webkit-tap-highlight-color: transparent; }
        
        .version-tag { position: fixed; top: 8px; right: 8px; background: rgba(0,0,0,0.5); color: #fff; padding: 3px 7px; border-radius: 6px; font-size: 9px; z-index: 10000; pointer-events: none; }
        
        /* Шапка */
        .header-sticky { position: sticky; top: 0; background: #fff; z-index: 1000; padding: 10px 20px; border-bottom: 1px solid #f2f2f2; text-align: center; }
        h2 { font-size: 20px; margin: 10px 0; font-weight: 800; }
        
        .tabs { display: flex; justify-content: center; gap: 15px; margin-bottom: 15px; }
        .tab { font-size: 13px; font-weight: 600; color: #999; padding: 8px 12px; border-radius: 10px; border: 2px solid transparent; cursor: pointer; }
        .tab.active { color: #000; border-color: #34c759; }

        .container { padding: 20px; display: flex; flex-direction: column; align-items: center; width: 100%; box-sizing: border-box; }
        
        .btn-black { background: #000; color: #fff; border: none; padding: 18px; border-radius: 16px; width: 100%; max-width: 350px; font-weight: 700; font-size: 16px; cursor: pointer; }
        
        /* Поля ввода */
        .editor-form { width: 100%; max-width: 350px; }
        .input-group { margin-bottom: 25px; }
        .input-label { font-size: 13px; color: #888; margin-bottom: 8px; display: block; font-weight: 500; }
        
        .main-input { 
            width: 100%; padding: 18px; border: 1px solid #efefef; border-radius: 16px; 
            font-size: 17px; font-weight: 600; box-sizing: border-box; outline: none; background: #f9f9f9;
            color: #000; /* Цвет вводимого текста */
            transition: all 0.2s;
        }
        
        /* Цвет подсказки (placeholder) */
        .main-input::placeholder { color: #ccc; font-weight: 400; }
        .main-input:focus { border-color: #007aff; background: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }

        .nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: #fff; }
        .nav-btn { background: none; border: none; font-size: 16px; cursor: pointer; font-weight: 600; padding: 5px; }
        
        .project-card { border: 1px solid #eee; border-radius: 18px; padding: 18px; margin-bottom: 12px; display: flex; align-items: center; width: 100%; max-width: 350px; box-sizing: border-box; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="version-tag" id="appVersion">v. --:--</div>

<div id="mainView">
    <div class="header-sticky">
        <h2>Мои Проекты</h2>
        <div class="tabs">
            <div id="t-active" class="tab active" onclick="switchTab('active')">Активные</div>
            <div id="t-hidden" class="tab" onclick="switchTab('hidden')">🙈 Скрытые</div>
            <div id="t-trash" class="tab" onclick="switchTab('trash')">Корзина</div>
        </div>
        <button class="btn-black" onclick="createNewProject()">+ Создать план</button>
    </div>
    <div class="container" id="projectList"></div>
</div>

<div id="editorView" class="hidden">
    <div class="nav-bar">
        <button class="nav-btn" onclick="handleBack()" style="color: #007aff;">← Назад</button>
        <button class="nav-btn" onclick="saveAndContinue()" style="color: #34c759;">Сохранить</button>
    </div>
    <div class="container">
        <h3 style="font-size: 28px; font-weight: 800; width: 100%; margin: 10px 0 35px; text-align: left;">Что планируем?</h3>
        <div class="editor-form">
            <div class="input-group">
                <span class="input-label">Название проекта (видно всем)</span>
                <input type="text" id="pTitle" class="main-input" placeholder="Например: Съемка в лесу">
            </div>
            <div class="input-group">
                <span class="input-label">Дата</span>
                <input type="text" id="pDate" class="main-input" placeholder="дд.мм" maxlength="5" inputmode="numeric">
            </div>
        </div>
    </div>
</div>

<div id="detailsView" class="hidden">
    <div class="nav-bar">
        <button class="nav-btn" onclick="showView('mainView')" style="color: #007aff;">← К проектам</button>
    </div>
    <div class="container">
        <h3 id="detailTitle" style="margin-top: 40px; font-weight: 800; font-size: 24px;"></h3>
        <p style="color: #999; margin-top: 10px;">План успешно создан.</p>
    </div>
</div>

<script>
    const UPDATE_TIME = "30.04 15:55"; 
    document.getElementById('appVersion').innerText = `v. ${UPDATE_TIME}`;

    const SUPABASE_URL = 'https://ndgkvnuyngwhecyqsdbp.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_7o_wxB527BROaf9QKHxcnw_5B7rUUn-';
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const tg = window.Telegram.WebApp;
    const uid = tg.initDataUnsafe?.user?.id?.toString() || "demo";

    let currentTab = 'active';
    let currentEditId = null;

    // Маска даты с проверкой на реальные числа
    document.getElementById('pDate').addEventListener('input', function (e) {
        let v = e.target.value.replace(/\D/g, ''); 
        
        if (v.length >= 2) {
            let day = parseInt(v.substring(0, 2));
            if (day > 31) day = 31;
            if (v.substring(0, 2) === '00') day = '01';
            v = day.toString().padStart(2, '0') + v.substring(2);
        }

        if (v.length >= 4) {
            let month = parseInt(v.substring(2, 4));
            if (month > 12) month = 12;
            if (v.substring(2, 4) === '00') month = '01';
            v = v.substring(0, 2) + month.toString().padStart(2, '0');
        }

        if (v.length > 2) {
            v = v.substring(0, 2) + '.' + v.substring(2, 4);
        }
        e.target.value = v;
    });

    async function loadProjects() {
        const { data } = await client.from('projects').select('*').eq('user_id', uid).eq('status', currentTab).order('created_at', {ascending: false});
        const list = document.getElementById('projectList');
        list.innerHTML = data?.map(p => `
            <div class="project-card" onclick="openEdit('${p.id}')">
                <div style="flex:1">
                    <div style="font-weight:800; font-size:17px;">${p.title}</div>
                    <div style="font-size:13px; color:#888; margin-top:5px;">🗓 ${p.date_scout || 'дд.мм'}</div>
                </div>
                <div style="color:#ddd; font-size:22px;">›</div>
            </div>
        `).join('') || '<p style="color:#bbb; margin-top:50px;">Список пуст</p>';
    }

    function createNewProject() {
        currentEditId = null;
        document.getElementById('pTitle').value = '';
        document.getElementById('pDate').value = '';
        showView('editorView');
    }

    async function openEdit(id) {
        const { data } = await client.from('projects').select('*').eq('id', id).single();
        if (data) {
            currentEditId = data.id;
            document.getElementById('pTitle').value = data.title;
            document.getElementById('pDate').value = data.date_scout || '';
            showView('editorView');
        }
    }

    function handleBack() {
        const hasContent = document.getElementById('pTitle').value.trim().length > 0;
        if (hasContent && !currentEditId) {
            if (confirm("Выйти без сохранения?")) showView('mainView');
        } else {
            showView('mainView');
        }
    }

    async function saveAndContinue() {
        const title = document.getElementById('pTitle').value.trim();
        const date = document.getElementById('pDate').value;
        if (!title) return alert("Введите название");

        const { error } = await client.from('projects').upsert({
            id: currentEditId || undefined,
            user_id: uid,
            title: title,
            date_scout: date,
            status: 'active'
        });

        if (!error) {
            document.getElementById('detailTitle').innerText = title;
            showView('detailsView');
        }
    }

    function showView(v) {
        document.getElementById('mainView').classList.add('hidden');
        document.getElementById('editorView').classList.add('hidden');
        document.getElementById('detailsView').classList.add('hidden');
        document.getElementById(v).classList.remove('hidden');
        if (v === 'mainView') loadProjects();
    }

    function switchTab(t) {
        currentTab = t;
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        document.getElementById('t-'+t).classList.add('active');
        loadProjects();
    }

    loadProjects();
</script>
</body>
</html>
