<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #fff; margin: 0; padding: 0; color: #000; -webkit-tap-highlight-color: transparent; user-select: none; }
        .header-sticky { position: sticky; top: 0; background: #fff; z-index: 1000; padding: 15px 20px; border-bottom: 1px solid #f2f2f2; text-align: center; }
        
        /* Табы */
        .tabs { display: flex; justify-content: center; gap: 8px; margin-top: 10px; }
        .tab { font-size: 12px; font-weight: 700; color: #999; padding: 6px 14px; border-radius: 10px; cursor: pointer; background: #f5f5f5; border: none; }
        .tab.active[data-tab="active"] { background: #34c759; color: #fff; }
        .tab.active[data-tab="hidden"] { background: #8e8e93; color: #fff; }
        .tab.active[data-tab="trash"] { background: #ff3b30; color: #fff; }

        /* Кнопки */
        .btn-base { height: 48px; border-radius: 14px; font-size: 14px; font-weight: 700; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-black { background: #000; color: #fff; width: calc(100% - 40px); max-width: 350px; margin: 15px auto; }
        
        /* Модалка создания */
        .full-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 5000; display: none; flex-direction: column; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; font-weight: 700; color: #666; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 16px; background: #f9f9f9; }
        
        .section-box { border: 1px solid #eee; border-radius: 15px; padding: 15px; margin-bottom: 15px; background: #fff; }
        .section-title { font-size: 14px; font-weight: 800; margin-bottom: 10px; display: flex; justify-content: space-between; }
        
        .project-card { border: 1px solid #eee; border-radius: 16px; padding: 15px; margin-bottom: 10px; background: #fff; width: 100%; max-width: 350px; box-sizing: border-box; }
        .selection-actions { display: none; gap: 6px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="mainView">
    <div class="header-sticky">
        <h2 style="margin:0; font-size:18px;">Локации</h2>
        <div class="tabs">
            <div id="t-active" class="tab active" data-tab="active" onclick="switchTab('active')">Активные</div>
            <div id="t-hidden" class="tab" data-tab="hidden" onclick="switchTab('hidden')">Скрытые</div>
            <div id="t-trash" class="tab" data-tab="trash" onclick="switchTab('trash')" oncontextmenu="handleTrashContext(event)">Корзина</div>
        </div>
    </div>
    
    <button id="addBtn" class="btn-base btn-black" onclick="openCreateModal()">+ Создать план</button>
    <div id="projectList" style="padding: 20px; display: flex; flex-direction: column; align-items: center;"></div>
</div>

<!-- ТВОИ ОКНА СОЗДАНИЯ -->
<div id="createModal" class="full-modal">
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="margin:0">Новый план</h2>
        <button onclick="closeCreateModal()" style="background:none; border:none; font-size: 24px;">✕</button>
    </div>

    <div class="form-group">
        <label>НАЗВАНИЕ ПРОЕКТА</label>
        <input type="text" id="f-title" placeholder="Например: Съемка рекламы">
    </div>

    <div style="display:flex; gap:10px;">
        <div class="form-group" style="flex:1">
            <label>ДАТА</label>
            <input type="date" id="f-date">
        </div>
        <div class="form-group" style="flex:1">
            <label>МЕСТО СБОРА</label>
            <input type="text" id="f-meeting" placeholder="Адрес">
        </div>
    </div>

    <div id="locationsWrapper">
        <div class="section-box">
            <div class="section-title">ЛОКАЦИЯ 1</div>
            <input type="text" class="l-name" placeholder="Название или адрес" style="width:100%; padding:10px; border-radius:8px; border:1px solid #eee;">
        </div>
    </div>
    
    <button onclick="addLocationField()" style="background:none; border:none; color:#007aff; font-weight:700; margin-bottom:20px;">+ Добавить локацию</button>

    <div class="section-box">
        <div class="section-title">ОБЕДЕННЫЙ ПЕРЕРЫВ</div>
        <div style="display:flex; gap:10px;">
            <input type="time" id="f-lunch-start" style="flex:1; padding:10px; border-radius:8px; border:1px solid #eee;">
            <input type="time" id="f-lunch-end" style="flex:1; padding:10px; border-radius:8px; border:1px solid #eee;">
        </div>
    </div>

    <button class="btn-base btn-black" style="width:100%; margin-top: auto;" onclick="saveNewPlan()">Сохранить план</button>
</div>

<script>
    const SUPABASE_URL = 'https://ndgkvnuyngwhecyqsdbp.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_7o_wxB527BROaf9QKHxcnw_5B7rUUn-';
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const tg = window.Telegram.WebApp;
    const uid = tg.initDataUnsafe?.user?.id?.toString() || "demo";

    let currentTab = 'active';

    function openCreateModal() { document.getElementById('createModal').style.display = 'flex'; }
    function closeCreateModal() { document.getElementById('createModal').style.display = 'none'; }

    function addLocationField() {
        const wrapper = document.getElementById('locationsWrapper');
        const index = wrapper.children.length + 1;
        const div = document.createElement('div');
        div.className = 'section-box';
        div.innerHTML = `<div class="section-title">ЛОКАЦИЯ ${index}</div><input type="text" class="l-name" placeholder="Название или адрес" style="width:100%; padding:10px; border-radius:8px; border:1px solid #eee;">`;
        wrapper.appendChild(div);
    }

    async function saveNewPlan() {
        const title = document.getElementById('f-title').value;
        if (!title) return tg.showAlert("Введите название!");

        const locs = Array.from(document.querySelectorAll('.l-name')).map(el => el.value);
        
        const { error } = await client.from('projects').insert([{
            user_id: uid,
            title: title,
            date_scout: document.getElementById('f-date').value,
            meeting_point: document.getElementById('f-meeting').value,
            locations: locs,
            lunch_time: `${document.getElementById('f-lunch-start').value} - ${document.getElementById('f-lunch-end').value}`,
            status: 'active'
        }]);

        if (!error) {
            closeCreateModal();
            loadProjects();
        }
    }

    async function loadProjects() {
        const { data } = await client.from('projects').select('*').eq('user_id', uid).eq('status', currentTab).order('created_at', {ascending: false});
        const list = document.getElementById('projectList');
        list.innerHTML = (data || []).map(p => `
            <div class="project-card">
                <div style="font-weight:800; font-size:16px;">${p.title}</div>
                <div style="font-size:12px; color:#666; margin-top:5px;">🗓 ${p.date_scout || 'Нет даты'}</div>
            </div>
        `).join('');
    }

    function switchTab(t) {
        currentTab = t;
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        document.getElementById(`t-${t}`).classList.add('active');
        document.getElementById('addBtn').style.display = (t === 'active') ? 'flex' : 'none';
        loadProjects();
    }

    function handleTrashContext(e) {
        e.preventDefault();
        tg.showActionSheet({
            title: 'Управление корзиной',
            buttons: [{ text: 'Очистить всю корзину', type: 'destructive' }]
        }, async (index) => {
            if (index === 0) {
                await client.from('projects').delete().eq('user_id', uid).eq('status', 'trash');
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                loadProjects();
            }
        });
    }

    loadProjects();
</script>
</body>
</html>
