<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #fff; margin: 0; padding: 0; color: #000; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }
        .version-tag { position: fixed; top: 8px; right: 8px; background: rgba(0,0,0,0.6); color: #fff; padding: 4px 8px; border-radius: 8px; font-size: 10px; z-index: 10001; pointer-events: none; }
        
        .header-sticky { position: sticky; top: 0; background: #fff; z-index: 1000; padding: 25px 20px 15px 20px; border-bottom: 1px solid #f2f2f2; text-align: center; }
        h2 { font-size: 20px; margin: 0 0 20px 0; font-weight: 800; }
        
        .tabs { display: flex; justify-content: center; gap: 12px; margin-bottom: 15px; }
        .tab { font-size: 13px; font-weight: 700; color: #999; padding: 8px 16px; border-radius: 12px; cursor: pointer; background: #f5f5f5; border: none; }
        .tab.active { background: #000; color: #fff; }

        .selection-actions { display: none; gap: 8px; width: 100%; max-width: 350px; margin: 0 auto; }
        .sel-btn { flex: 1; padding: 15px; border-radius: 14px; font-size: 13px; font-weight: 700; border: none; cursor: pointer; }
        .btn-cancel { background: #f2f2f2; }
        .btn-action-main { background: #000; color: #fff; }

        .container { padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .btn-black { background: #000; color: #fff; border: none; padding: 18px; border-radius: 16px; width: 100%; max-width: 350px; font-weight: 700; cursor: pointer; }
        
        .project-card { border: 1px solid #eee; border-radius: 18px; padding: 18px; margin-bottom: 12px; display: flex; align-items: center; width: 100%; max-width: 350px; box-sizing: border-box; background: #fff; transition: all 0.2s ease; position: relative; cursor: pointer; }
        .project-card.selected { border: 2px solid #007aff; background: #f0f7ff; transform: scale(0.98); }
        
        /* Чекбокс */
        .card-checkbox { width: 22px; height: 22px; margin-right: 15px; pointer-events: none; display: none; accent-color: #007aff; }
        .selection-mode .card-checkbox { display: block; }
        
        .card-content { flex: 1; pointer-events: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="version-tag">v. 01.15 CHECKBOX-FIX</div>

<div id="mainView">
    <div class="header-sticky">
        <h2>Локации</h2>
        <div class="tabs">
            <div id="t-active" class="tab active" onclick="switchTab('active')">Активные</div>
            <div id="t-hidden" class="tab" onclick="switchTab('hidden')">Скрытые</div>
            <div id="t-trash" class="tab" onclick="switchTab('trash')">Корзина</div>
        </div>
        
        <div id="selectionActions" class="selection-actions">
            <button class="sel-btn btn-cancel" onclick="exitSelectionMode()">Отмена</button>
            <button id="mainActionBtn" class="sel-btn btn-action-main" onclick="applyBulkAction()">Действие</button>
        </div>

        <button id="addBtn" class="btn-black" onclick="createNewProject()">+ Создать план</button>
    </div>
    <div class="container" id="projectList"></div>
</div>

<script>
    const SUPABASE_URL = 'https://ndgkvnuyngwhecyqsdbp.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_7o_wxB527BROaf9QKHxcnw_5B7rUUn-';
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const tg = window.Telegram.WebApp;
    const uid = tg.initDataUnsafe?.user?.id?.toString() || "demo";

    let currentTab = 'active', isSelectionMode = false, selectedIds = new Set();
    let pressTimer, isLongPressOccurred = false;

    // ОБРАБОТКА НАЖАТИЙ
    function startPress(e, id) {
        isLongPressOccurred = false;
        clearTimeout(pressTimer);
        pressTimer = setTimeout(() => {
            isLongPressOccurred = true;
            if (!isSelectionMode) {
                isSelectionMode = true;
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy');
                toggleId(id);
            }
        }, 600);
    }

    function endPress() {
        clearTimeout(pressTimer);
    }

    function handleCardClick(e, id) {
        if (isLongPressOccurred) {
            isLongPressOccurred = false;
            return;
        }
        if (isSelectionMode || currentTab === 'trash') {
            toggleId(id);
        } else {
            // Здесь будет открытие редактора
            console.log("Редактировать:", id);
        }
    }

    function toggleId(id) {
        if (selectedIds.has(id)) {
            selectedIds.delete(id);
        } else {
            selectedIds.add(id);
        }
        
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        
        if (selectedIds.size === 0 && currentTab !== 'trash') {
            isSelectionMode = false;
        }
        
        updateSelectionUI();
        renderSelectionState(); 
    }

    function renderSelectionState() {
        // Проходим по всем карточкам и синхронизируем визуальное состояние
        document.querySelectorAll('.project-card').forEach(card => {
            const id = card.getAttribute('data-id');
            const checkbox = card.querySelector('.card-checkbox');
            const isSelected = selectedIds.has(id);
            
            if (isSelected) {
                card.classList.add('selected');
            } else {
                card.classList.remove('selected');
            }
            
            if (checkbox) {
                checkbox.checked = isSelected; // Принудительно ставим галочку
            }
        });
    }

    function updateSelectionUI() {
        const actions = document.getElementById('selectionActions');
        const addBtn = document.getElementById('addBtn');
        const list = document.getElementById('projectList');
        const mainBtn = document.getElementById('mainActionBtn');

        if (isSelectionMode || currentTab === 'trash') {
            list.classList.add('selection-mode');
            actions.style.display = 'flex';
            addBtn.style.display = 'none';
            
            let count = selectedIds.size;
            if (currentTab === 'active') mainBtn.innerText = `Скрыть (${count})`;
            else if (currentTab === 'hidden') mainBtn.innerText = `В актив (${count})`;
            else mainBtn.innerText = `Восстановить (${count})`;
        } else {
            list.classList.remove('selection-mode');
            actions.style.display = 'none';
            addBtn.style.display = (currentTab === 'active') ? 'block' : 'none';
        }
    }

    function exitSelectionMode() {
        isSelectionMode = false;
        selectedIds.clear();
        updateSelectionUI();
        renderSelectionState();
    }

    async function loadProjects() {
        const { data, error } = await client.from('projects')
            .select('*')
            .eq('user_id', uid)
            .eq('status', currentTab)
            .order('created_at', {ascending: false});
        
        const list = document.getElementById('projectList');
        if (error || !data) return;

        list.innerHTML = data.map(p => `
            <div class="project-card ${selectedIds.has(p.id) ? 'selected' : ''}" 
                 data-id="${p.id}"
                 onmousedown="startPress(event, '${p.id}')"
                 onmouseup="endPress()"
                 onmouseleave="endPress()"
                 ontouchstart="startPress(event, '${p.id}')"
                 ontouchend="endPress()"
                 onclick="handleCardClick(event, '${p.id}')"
                 oncontextmenu="event.preventDefault(); return false;">
                
                <input type="checkbox" class="card-checkbox" ${selectedIds.has(p.id) ? 'checked' : ''}>
                
                <div class="card-content">
                    <div style="font-weight:800; font-size:17px; margin-bottom:4px;">${p.title}</div>
                    <div style="font-size:12px; color:#666;">🗓 ${p.date_scout || 'Нет даты'}</div>
                </div>
            </div>
        `).join('');
        
        updateSelectionUI();
        renderSelectionState();
    }

    function switchTab(t) {
        currentTab = t;
        exitSelectionMode();
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        event.target.classList.add('active');
        loadProjects();
    }

    async function applyBulkAction() {
        if (selectedIds.size === 0) return;
        let newStatus = currentTab === 'active' ? 'hidden' : 'active';
        const { error } = await client.from('projects').update({ status: newStatus }).in('id', Array.from(selectedIds));
        if (!error) { exitSelectionMode(); loadProjects(); }
    }

    function createNewProject() {
        // Здесь логика открытия пустого редактора
        console.log("Создать новый проект");
    }

    loadProjects();
</script>
</body>
</html>
