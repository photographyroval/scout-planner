<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #fff; margin: 0; padding: 0; color: #000; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .version-tag { position: fixed; top: 8px; right: 8px; background: rgba(0,0,0,0.6); color: #fff; padding: 4px 8px; border-radius: 8px; font-size: 10px; z-index: 10001; pointer-events: none; }
        .header-sticky { position: sticky; top: 0; background: #fff; z-index: 1000; padding: 25px 20px 15px 20px; border-bottom: 1px solid #f2f2f2; text-align: center; }
        h2 { font-size: 20px; margin: 0 0 20px 0; font-weight: 800; }
        .tabs { display: flex; justify-content: center; gap: 12px; margin-bottom: 15px; }
        .tab { font-size: 13px; font-weight: 700; color: #999; padding: 8px 16px; border-radius: 12px; cursor: pointer; background: #f5f5f5; border: none; }
        .tab.active { background: #34c759; color: #fff; transform: scale(1.1); }
        .container { padding: 20px; display: flex; flex-direction: column; align-items: center; width: 100%; box-sizing: border-box; }
        .btn-black { background: #000; color: #fff; border: none; padding: 18px; border-radius: 16px; width: 100%; max-width: 350px; font-weight: 700; font-size: 16px; cursor: pointer; }
        .input-group { margin-bottom: 20px; width: 100%; max-width: 350px; }
        .input-label { font-size: 13px; color: #888; margin-bottom: 8px; display: block; text-align: left; }
        .main-input { width: 100%; padding: 14px; border: 1px solid #efefef; border-radius: 12px; font-size: 16px; box-sizing: border-box; outline: none; background: #f9f9f9; }
        .nav-bar { display: flex; justify-content: space-between; padding: 12px 20px; border-bottom: 1px solid #f9f9f9; }
        .nav-btn { background: none; border: none; font-size: 16px; cursor: pointer; font-weight: 600; }
        .hidden { display: none !important; }
        .location-block { background: #fcfcfc; border: 1px solid #eee; border-radius: 20px; padding: 15px; margin-bottom: 20px; width: 100%; }
    </style>
</head>
<body>

<div class="version-tag">v. 30.04 19:50 (Ultra Safe)</div>

<!-- ЭКРАН 1: СПИСОК -->
<div id="mainView">
    <div class="header-sticky">
        <h2>Мои Проекты</h2>
        <div class="tabs">
            <div id="t-active" class="tab active" onclick="switchTab('active')">Активные</div>
            <div id="t-hidden" class="tab" onclick="switchTab('hidden')">Скрытые</div>
        </div>
        <button class="btn-black" onclick="createNewProject()">+ Создать план</button>
    </div>
    <div class="container" id="projectList"></div>
</div>

<!-- ЭКРАН 2: ОБЩЕЕ (Только заголовок и дата) -->
<div id="editorView" class="hidden">
    <div class="nav-bar">
        <button class="nav-btn" onclick="showView('mainView')" style="color: #007aff;">← Отмена</button>
        <button class="nav-btn" onclick="showView('locationView')" style="color: #34c759;">Далее</button>
    </div>
    <div class="container">
        <h3>Общее</h3>
        <div class="input-group">
            <span class="input-label">Название проекта</span>
            <input type="text" id="pTitle" class="main-input" placeholder="Название">
        </div>
        <div class="input-group">
            <span class="input-label">Дата</span>
            <input type="text" id="pDate" class="main-input" placeholder="дд.мм">
        </div>
    </div>
</div>

<!-- ЭКРАН 3: СБОР (Данные сохранятся внутри JSON) -->
<div id="locationView" class="hidden">
    <div class="nav-bar">
        <button class="nav-btn" onclick="showView('editorView')" style="color: #007aff;">← Назад</button>
        <button class="nav-btn" onclick="showView('planView')" style="color: #34c759;">Далее</button>
    </div>
    <div class="container">
        <h3>Сбор</h3>
        <input type="text" id="pTime" class="main-input" placeholder="Время сбора" style="margin-bottom:10px;">
        <input type="text" id="pAddress" class="main-input" placeholder="Адрес сбора" style="margin-bottom:10px;">
        <input type="text" id="pMapUrl" class="main-input" placeholder="Ссылка на карту">
    </div>
</div>

<!-- ЭКРАН 4: ЛОКАЦИИ И СОХРАНЕНИЕ -->
<div id="planView" class="hidden">
    <div class="nav-bar">
        <button class="nav-btn" onclick="showView('locationView')" style="color: #007aff;">← Назад</button>
        <button class="nav-btn" id="btnFinalSave" onclick="saveEverything()" style="color: #34c759; font-weight:800;">СОХРАНИТЬ ВСЁ</button>
    </div>
    <div class="container">
        <h3>Локации</h3>
        <div id="locationsList" style="width: 100%;"></div>
        <button class="btn-black" onclick="addLocationBlock()" style="background:#f2f2f2; color:#000; margin-top:10px;">+ Добавить точку</button>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://ndgkvnuyngwhecyqsdbp.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_7o_wxB527BROaf9QKHxcnw_5B7rUUn-';
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const tg = window.Telegram.WebApp;
    const uid = tg.initDataUnsafe?.user?.id?.toString() || "demo";

    let currentEditId = null;
    let locations = [];

    function showView(v) {
        document.querySelectorAll('body > div[id]').forEach(d => d.classList.add('hidden'));
        document.getElementById(v).classList.remove('hidden');
        if (v === 'mainView') loadProjects();
    }

    // ГЛАВНАЯ ФУНКЦИЯ СОХРАНЕНИЯ
    async function saveEverything() {
        const btn = document.getElementById('btnFinalSave');
        const title = document.getElementById('pTitle').value.trim();
        if (!title) return alert("Введите название проекта");

        btn.disabled = true;
        btn.innerText = "⏳ Сохранение...";

        // Упаковываем ВСЁ в один объект plan_data, чтобы база не ругалась на колонки
        const fullData = {
            meeting: {
                time: document.getElementById('pTime').value,
                address: document.getElementById('pAddress').value,
                map: document.getElementById('pMapUrl').value
            },
            points: locations
        };

        const row = {
            user_id: uid,
            title: title,
            date_scout: document.getElementById('pDate').value,
            plan_data: fullData, // Здесь теперь и сбор, и локации
            status: 'active'
        };

        if (currentEditId) row.id = currentEditId;

        try {
            const { error } = await client.from('projects').upsert(row);
            if (error) throw error;
            showView('mainView');
        } catch (e) {
            alert("Ошибка сохранения: " + e.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "СОХРАНИТЬ ВСЁ";
        }
    }

    function addLocationBlock() {
        const id = Date.now();
        locations.push({ id, name: '', time: '' });
        renderLocations();
    }

    function renderLocations() {
        const container = document.getElementById('locationsList');
        container.innerHTML = locations.map((l, i) => `
            <div class="location-block">
                <input type="text" class="main-input" placeholder="Название точки" value="${l.name}" onchange="updateLoc(${l.id}, 'name', this.value)" style="margin-bottom:8px;">
                <input type="text" class="main-input" placeholder="Время" value="${l.time}" onchange="updateLoc(${l.id}, 'time', this.value)">
            </div>
        `).join('');
    }

    function updateLoc(id, field, val) {
        const loc = locations.find(l => l.id === id);
        if (loc) loc[field] = val;
    }

    async function loadProjects() {
        const { data } = await client.from('projects').select('*').eq('user_id', uid).order('created_at', {ascending: false});
        const list = document.getElementById('projectList');
        list.innerHTML = data?.length ? data.map(p => `
            <div class="location-block" onclick="openEdit('${p.id}')">
                <div style="font-weight:800;">${p.title}</div>
                <div style="font-size:12px; color:#888;">${p.date_scout || ''}</div>
            </div>
        `).join('') : '<p>Проектов нет</p>';
    }

    async function openEdit(id) {
        const { data } = await client.from('projects').select('*').eq('id', id).single();
        if (data) {
            currentEditId = data.id;
            document.getElementById('pTitle').value = data.title || '';
            document.getElementById('pDate').value = data.date_scout || '';
            
            const savedPlan = data.plan_data || {};
            document.getElementById('pTime').value = savedPlan.meeting?.time || '';
            document.getElementById('pAddress').value = savedPlan.meeting?.address || '';
            document.getElementById('pMapUrl').value = savedPlan.meeting?.map || '';
            
            locations = savedPlan.points || [];
            renderLocations();
            showView('editorView');
        }
    }

    function createNewProject() {
        currentEditId = null;
        locations = [];
        document.querySelectorAll('input').forEach(i => i.value = '');
        renderLocations();
        showView('editorView');
    }

    loadProjects();
</script>
</body>
</html>
