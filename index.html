<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background: #fff; margin: 0; padding: 0; color: #000; 
            -webkit-tap-highlight-color: transparent; 
            -webkit-touch-callout: none; 
            -webkit-user-select: none; 
            user-select: none; 
        }
        
        /* Стили шапки и вкладок */
        .header-sticky { position: sticky; top: 0; background: #fff; z-index: 1000; padding: 20px 25px; border-bottom: 1px solid #f2f2f2; text-align: center; }
        h2 { margin: 0 0 15px 0; font-size: 20px; font-weight: 800; }
        .tabs { display: flex; justify-content: center; gap: 10px; margin-top: 5px; }
        .tab { font-size: 13px; font-weight: 700; color: #999; padding: 10px 18px; border-radius: 12px; cursor: pointer; background: #f5f5f5; border: none; transition: all 0.2s ease; }
        .tab.active[data-tab="active"] { background: #34c759 !important; color: #fff; }
        .tab.active[data-tab="hidden"] { background: #8e8e93 !important; color: #fff; }
        .tab.active[data-tab="trash"] { background: #ff3b30 !important; color: #fff; }

        /* Кнопки */
        .btn-base { height: 54px; border-radius: 16px; font-size: 16px; font-weight: 800; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease; }
        .btn-black { background: #000; color: #fff; width: calc(100% - 40px); max-width: 350px; margin: 20px auto; }
        .btn-continue { background: #34c759; color: #fff; width: 100%; margin-top: 10px; box-shadow: 0 4px 12px rgba(52,199,89,0.2); text-transform: uppercase; letter-spacing: 0.5px; }

        /* Модальное окно */
        .full-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 5000; display: none; flex-direction: column; overflow-y: auto; padding: 25px; box-sizing: border-box; }
        .separator { border: 0; border-top: 2px dashed #eee; margin: 15px 0 25px 0; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 12px; font-weight: 900; color: #000; margin-bottom: 8px; text-transform: uppercase; }
        .form-group input { width: 100%; padding: 14px; border: 1px solid #eee; border-radius: 12px; box-sizing: border-box; font-size: 16px; background: #f9f9f9; outline: none; color: #000; font-weight: 800; }
        
        /* Карточки проектов */
        .project-card { 
            border: 1px solid #eee; border-radius: 18px; padding: 20px; margin-bottom: 12px; background: #fff; 
            width: 100%; max-width: 350px; box-sizing: border-box; position: relative; 
            transition: transform 0.1s; display: flex; align-items: center; gap: 15px;
            touch-action: pan-y;
        }
        .project-card:active { transform: scale(0.98); }
        
        /* Чекбоксы */
        .checkbox { 
            width: 24px; height: 24px; border: 2px solid #ddd; border-radius: 8px; 
            display: none; align-items: center; justify-content: center; flex-shrink: 0;
            transition: all 0.2s;
        }
        .checkbox.visible { display: flex; }
        .checkbox.checked { background: #34c759; border-color: #34c759; }
        .checkbox.checked::after { content: '✓'; color: #fff; font-size: 14px; font-weight: 900; }

        /* Панель выбора */
        #selectionBar { 
            position: fixed; bottom: 0; left: 0; width: 100%; background: #000; color: #fff; 
            padding: 20px; box-sizing: border-box; display: none; justify-content: space-between; align-items: center; 
            z-index: 9999; border-radius: 24px 24px 0 0;
        }

        /* Служебная панель */
        #devPanel { position: fixed; bottom: 10px; right: 10px; display: flex; align-items: center; gap: 8px; z-index: 500; opacity: 0.5; }
    </style>
</head>
<body>

<div id="mainView">
    <div class="header-sticky">
        <h2>Локации</h2>
        <div class="tabs">
            <div id="t-active" class="tab active" data-tab="active" onclick="switchTab('active')">Активные</div>
            <div id="t-hidden" class="tab" data-tab="hidden" onclick="switchTab('hidden')">Скрытые</div>
            <div id="t-trash" class="tab" data-tab="trash" onclick="switchTab('trash')">Корзина</div>
        </div>
    </div>
    <button id="addBtn" class="btn-base btn-black" onclick="openModal()">+ Создать план</button>
    <div id="projectList" style="padding: 10px 20px; display: flex; flex-direction: column; align-items: center; padding-bottom: 140px;"></div>
</div>

<!-- Панель действий -->
<div id="selectionBar">
    <span id="selectedCount" style="font-weight: 800;">Выбрано: 0</span>
    <div style="display: flex; gap: 10px;">
        <button onclick="cancelSelection()" style="background: #333; border: none; color: #fff; padding: 10px 15px; border-radius: 12px; font-weight: 700;">✕</button>
        <button id="bulkActionBtn" onclick="applyBulkAction()" style="background: #fff; color: #000; border: none; padding: 10px 20px; border-radius: 12px; font-weight: 800;">Действие</button>
    </div>
</div>

<!-- Модалка (создание/редактирование) -->
<div id="createModal" class="full-modal">
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
        <h2 id="modalHeader" style="margin:0; font-size: 25px;"><b>Что планируем?</b></h2>
        <button onclick="closeModal()" style="background:#f5f5f5; border:none; width: 36px; height: 36px; border-radius: 50%; font-size: 18px;">✕</button>
    </div>
    <input type="hidden" id="f-id">
    <div class="form-group"><label>Название проекта</label><input type="text" id="f-title" placeholder="Название съемки"></div>
    <div class="form-group"><label>Дата</label><input type="text" id="f-date" placeholder="дд.мм" inputmode="numeric" maxlength="5"></div>
    <div class="separator"></div>
    <div class="form-group"><label>Место сбора</label><input type="text" id="f-meeting-address" placeholder="Адрес локации"></div>
    <div class="form-group"><label>Ссылка на карту</label><input type="url" id="f-meeting-link" placeholder="Google / Yandex"></div>
    <div style="display:flex; gap:12px;">
        <div class="form-group" style="flex:1"><label>Сбор</label><input type="text" id="f-time-arrival" placeholder="чч:мм" inputmode="numeric" maxlength="5"></div>
        <div class="form-group" style="flex:1"><label>Выезд</label><input type="text" id="f-time-departure" placeholder="чч:мм" inputmode="numeric" maxlength="5"></div>
    </div>
    <div class="separator"></div>
    <div class="form-group"><label>Заметки</label><input type="text" id="f-notes" placeholder="Важные детали..."></div>
    <button id="saveBtn" class="btn-base btn-continue" onclick="processSave()">Продолжить</button>
</div>

<!-- Панель разработчика -->
<div id="devPanel">
    <span style="font-size: 10px; color: #999; font-family: monospace;">v1.0.8</span>
    <button onclick="location.reload()" style="background: #f0f0f0; border: 1px solid #ddd; border-radius: 8px; padding: 4px 8px; font-size: 10px; color: #666; cursor: pointer;">Reload</button>
</div>

<script>
    const SUPABASE_URL = 'https://ndgkvnuyngwhecyqsdbp.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_7o_wxB527BROaf9QKHxcnw_5B7rUUn-';
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const tg = window.Telegram.WebApp;
    const uid = tg.initDataUnsafe?.user?.id?.toString() || "demo";

    let currentTab = 'active';
    let projects = [];
    let selectedIds = new Set();
    let isSelectionMode = false;
    let longPressTimer;

    function applyMask(input, separator) {
        input.addEventListener('input', () => {
            let value = input.value.replace(/\D/g, '');
            if (value.length > 2) value = value.slice(0, 2) + separator + value.slice(2, 4);
            input.value = value;
        });
    }
    applyMask(document.getElementById('f-date'), '.');
    applyMask(document.getElementById('f-time-arrival'), ':');
    applyMask(document.getElementById('f-time-departure'), ':');

    async function loadProjects() {
        const { data } = await client.from('projects').select('*').eq('user_id', uid).eq('status', currentTab).order('created_at', {ascending: false});
        projects = data || [];
        renderProjects();
    }

    function renderProjects() {
        const list = document.getElementById('projectList');
        list.innerHTML = projects.map(p => `
            <div class="project-card" 
                 onclick="handleCardClick(event, '${p.id}')" 
                 ontouchstart="handleTouchStart(event, '${p.id}')" 
                 ontouchend="handleTouchEnd(event)"
                 ontouchmove="handleTouchEnd(event)">
                <div class="checkbox ${isSelectionMode ? 'visible' : ''} ${selectedIds.has(p.id) ? 'checked' : ''}"></div>
                <div class="project-info">
                    <div style="font-weight:800; font-size:17px;">${p.title}</div>
                    <div style="font-size:13px; color:#777; margin-top:8px;">🗓 ${p.date_scout || '--.--'}</div>
                </div>
            </div>
        `).join('');
        updateSelectionBar();
    }

    // LONG PRESS
    function handleTouchStart(e, id) {
        if (isSelectionMode) return;
        longPressTimer = setTimeout(() => {
            isSelectionMode = true;
            tg.HapticFeedback.impactOccurred('heavy');
            toggleSelect(id);
        }, 600);
    }
    function handleTouchEnd() { clearTimeout(longPressTimer); }

    function handleCardClick(e, id) {
        if (isSelectionMode) {
            toggleSelect(id);
        } else {
            const p = projects.find(item => item.id == id);
            openModal(p);
        }
    }

    function toggleSelect(id) {
        if (selectedIds.has(id)) selectedIds.delete(id);
        else { selectedIds.add(id); tg.HapticFeedback.impactOccurred('light'); }
        if (selectedIds.size === 0) isSelectionMode = false;
        renderProjects();
    }

    function cancelSelection() {
        isSelectionMode = false;
        selectedIds.clear();
        renderProjects();
    }

    function updateSelectionBar() {
        const bar = document.getElementById('selectionBar');
        const btn = document.getElementById('bulkActionBtn');
        if (isSelectionMode && selectedIds.size > 0) {
            bar.style.display = 'flex';
            document.getElementById('selectedCount').innerText = `Выбрано: ${selectedIds.size}`;
            btn.innerText = (currentTab === 'active') ? 'В корзину' : (currentTab === 'trash' ? 'Удалить' : 'Вернуть');
        } else { bar.style.display = 'none'; }
    }

    // РЕДАКТИРОВАНИЕ И СОХРАНЕНИЕ
    function openModal(project = null) {
        if (project) {
            document.getElementById('modalHeader').innerText = "Редактирование";
            document.getElementById('saveBtn').innerText = "Сохранить";
            document.getElementById('f-id').value = project.id;
            document.getElementById('f-title').value = project.title || '';
            document.getElementById('f-date').value = project.date_scout || '';
            document.getElementById('f-meeting-address').value = project.meeting_point || '';
            document.getElementById('f-meeting-link').value = project.meeting_link || '';
            document.getElementById('f-time-arrival').value = project.time_arrival || '';
            document.getElementById('f-time-departure').value = project.time_departure || '';
            document.getElementById('f-notes').value = project.notes || '';
        } else {
            document.getElementById('modalHeader').innerText = "Что планируем?";
            document.getElementById('saveBtn').innerText = "Продолжить";
            document.getElementById('f-id').value = '';
            ['f-title', 'f-date', 'f-meeting-address', 'f-meeting-link', 'f-time-arrival', 'f-time-departure', 'f-notes'].forEach(id => document.getElementById(id).value = '');
        }
        document.getElementById('createModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('createModal').style.display = 'none'; }

    async function processSave() {
        const id = document.getElementById('f-id').value;
        const data = {
            user_id: uid,
            title: document.getElementById('f-title').value,
            date_scout: document.getElementById('f-date').value,
            meeting_point: document.getElementById('f-meeting-address').value,
            meeting_link: document.getElementById('f-meeting-link').value,
            time_arrival: document.getElementById('f-time-arrival').value,
            time_departure: document.getElementById('f-time-departure').value,
            notes: document.getElementById('f-notes').value,
            status: 'active'
        };
        if (!data.title) return tg.showAlert("Введите название!");
        const res = id ? await client.from('projects').update(data).eq('id', id) : await client.from('projects').insert([data]);
        if (!res.error) {
            tg.HapticFeedback.notificationOccurred('success');
            closeModal();
            loadProjects();
        }
    }

    async function applyBulkAction() {
        const ids = Array.from(selectedIds);
        if (currentTab === 'active') await client.from('projects').update({ status: 'trash' }).in('id', ids);
        else if (currentTab === 'trash') await client.from('projects').delete().in('id', ids);
        else await client.from('projects').update({ status: 'active' }).in('id', ids);
        tg.HapticFeedback.notificationOccurred('success');
        cancelSelection();
        loadProjects();
    }

    function switchTab(t) {
        currentTab = t;
        cancelSelection();
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        document.getElementById(`t-${t}`).classList.add('active');
        document.getElementById('addBtn').style.display = (t === 'active') ? 'flex' : 'none';
        loadProjects();
    }

    loadProjects();
</script>
</body>
</html>
