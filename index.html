<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #fff; margin: 0; padding: 15px; color: #000; text-align: center; }
        
        /* Временная плашка версии */
        .version-tag {
            position: fixed;
            top: 5px;
            right: 5px;
            background: rgba(0, 0, 0, 0.4);
            color: #fff;
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 10px;
            font-family: monospace;
            z-index: 9999;
            pointer-events: none; /* Чтобы не мешала нажимать на кнопки под ней */
        }

        h2 { font-size: 22px; margin: 10px 0; font-weight: 800; }
        
        .header-sticky { position: sticky; top: 0; background: #fff; z-index: 1000; padding-bottom: 10px; border-bottom: 1px solid #f2f2f2; }
        
        .tabs { display: flex; justify-content: center; align-items: center; gap: 10px; margin: 10px 0 15px; height: 55px; }
        .tab { 
            font-size: 13px; font-weight: 600; cursor: pointer; color: #999; padding: 8px 14px; border-radius: 12px; 
            border: 2px solid transparent; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; gap: 5px; background: #fdfdfd;
        }
        .tab.active { transform: scale(1.1); color: #000; background: #fff; }
        #t-active.active { border-color: #34c759; color: #34c759; }
        #t-hidden.active { border-color: #8e8e93; color: #8e8e93; }
        #t-trash.active { border-color: #ff3b30; color: #ff3b30; }

        .project-card { 
            border: 1px solid #eee; border-radius: 16px; padding: 16px; margin-bottom: 12px; 
            display: flex; align-items: center; gap: 12px; transition: all 0.2s ease; position: relative;
        }
        .project-card.selected { border-color: #007aff; background: #f0f7ff; transform: scale(0.98); }
        
        .check-circle { 
            width: 22px; height: 22px; border: 2px solid #ddd; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: 0.2s;
        }
        .selected .check-circle { background: #007aff; border-color: #007aff; }
        .selected .check-circle::after { content: '✓'; color: #fff; font-size: 12px; font-weight: 900; }

        .project-info { flex: 1; text-align: left; cursor: pointer; }
        .project-title { font-weight: 800; font-size: 18px; margin-bottom: 2px; }
        
        .action-bar { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
            background: #1c1c1e; color: #fff; padding: 12px 24px; border-radius: 25px;
            display: flex; align-items: center; gap: 20px; z-index: 2000; box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            font-size: 14px; font-weight: 600;
        }
        .action-btn { cursor: pointer; padding: 5px 10px; border-radius: 8px; transition: 0.2s; }

        .btn-main { background: #000; color: #fff; border: none; padding: 14px; border-radius: 14px; width: 100%; font-weight: 700; font-size: 16px; cursor: pointer; }
        .tag-pill { padding: 3px 8px; border-radius: 6px; font-size: 10px; font-weight: 700; color: #fff; margin-right: 4px; display: inline-block; text-transform: uppercase; }
        .tag-gray { background: #8e8e93; } .tag-red { background: #ff3b30; } .tag-green { background: #34c759; } .tag-blue { background: #007aff; } .tag-yellow { background: #ffcc00; color: #000; }

        .hidden { display: none !important; }
        .edit-icon { font-size: 18px; color: #ccc; padding: 5px; }
    </style>
</head>
<body>

<!-- Та самая плашка -->
<div class="version-tag" id="appVersion">v. --:--</div>

<div id="mainView">
    <div class="header-sticky">
        <h2>Мои Проекты</h2>
        <div class="tabs">
            <div id="t-active" class="tab active" onclick="switchTab('active')">Активные</div>
            <div id="t-hidden" class="tab" onclick="switchTab('hidden')">🙈 Скрытые</div>
            <div id="t-trash" class="tab" onclick="switchTab('trash')">Корзина</div>
        </div>
        <button id="addBtn" class="btn-main" onclick="createNewProject()">+ Создать план</button>
    </div>
    <div id="projectList" style="margin-top: 15px; padding-bottom: 100px;"></div>
</div>

<div id="multiAction" class="action-bar hidden">
    <span id="selectCount" style="color: #007aff; font-size: 18px;">0</span>
    <div style="width: 1px; height: 20px; background: #444;"></div>
    <span id="actRestore" class="action-btn" onclick="bulkUpdate('active')">📦 В актив</span>
    <span id="actHide" class="action-btn" onclick="bulkUpdate('hidden')">🙈 Скрыть</span>
    <span id="actTrash" class="action-btn" style="color: #ff453a;" onclick="bulkUpdate('trash')">🗑 Удалить</span>
</div>

<div id="editorView" class="hidden" style="padding: 20px; text-align: left;">
    <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom: 30px;">
        <button onclick="closeEditor()" style="background:none; border:none; font-size:16px; color:#666;">Отмена</button>
        <button onclick="saveProject()" style="background:none; border:none; font-weight:800; font-size:16px; color:#007aff;">Готово</button>
    </div>
    <h3 id="editHeader" style="font-weight: 800; margin-bottom: 20px;">Новый проект</h3>
    <input type="text" id="pTitle" style="width:100%; padding:15px; border:1px solid #eee; border-radius:12px; margin-bottom:15px; font-size:18px; font-weight:700;" placeholder="Название">
    <input type="text" id="pDate" style="width:100%; padding:15px; border:1px solid #eee; border-radius:12px; margin-bottom:15px;" placeholder="Дата съемки">
    <div id="tempTags" style="margin-bottom: 15px;"></div>
</div>

<script>
    // МЕНЯЙ ЭТУ СТРОКУ ПРИ КАЖДОМ ОБНОВЛЕНИИ
    const UPDATE_TIME = "30.04 14:10"; 
    document.getElementById('appVersion').innerText = `v. ${UPDATE_TIME}`;

    const SUPABASE_URL = 'https://ndgkvnuyngwhecyqsdbp.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_7o_wxB527BROaf9QKHxcnw_5B7rUUn-';
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const tg = window.Telegram.WebApp;
    
    let currentTab = 'active';
    let selectedIds = new Set();
    let currentEditId = null;
    const uid = tg.initDataUnsafe?.user?.id?.toString() || "demo";

    async function loadProjects() {
        const { data } = await client.from('projects').select('*').eq('user_id', uid).eq('status', currentTab).order('created_at', {ascending: false});
        const list = document.getElementById('projectList');
        list.innerHTML = data.map(p => `
            <div class="project-card ${selectedIds.has(p.id) ? 'selected' : ''}" id="card-${p.id}" onclick="toggleSelect('${p.id}')">
                <div class="check-circle"></div>
                <div class="project-info">
                    <div class="project-title">${p.title}</div>
                    <div style="font-size:13px; color:#888">🗓 ${p.date_scout || 'Нет даты'}</div>
                    <div style="margin-top:6px;">${(p.tags || []).map(t => {
                        const [n, c] = t.split(':');
                        return `<span class="tag-pill tag-${c}">${n}</span>`;
                    }).join('')}</div>
                </div>
                <div class="edit-icon" onclick="event.stopPropagation(); openEdit('${p.id}')">✎</div>
            </div>
        `).join('') || `<p style="color:#bbb; margin-top:60px;">Пусто</p>`;
    }

    function toggleSelect(id) {
        if (selectedIds.has(id)) selectedIds.delete(id);
        else selectedIds.add(id);
        document.getElementById(`card-${id}`).classList.toggle('selected');
        updateActionBar();
    }

    function updateActionBar() {
        const bar = document.getElementById('multiAction');
        const count = document.getElementById('selectCount');
        if (selectedIds.size > 0) {
            bar.classList.remove('hidden');
            count.innerText = selectedIds.size;
            document.getElementById('actRestore').classList.toggle('hidden', currentTab === 'active');
            document.getElementById('actHide').classList.toggle('hidden', currentTab !== 'active');
        } else {
            bar.classList.add('hidden');
        }
    }

    async function bulkUpdate(newStatus) {
        const ids = Array.from(selectedIds);
        await client.from('projects').update({ status: newStatus }).in('id', ids);
        selectedIds.clear();
        updateActionBar();
        loadProjects();
    }

    function switchTab(t) {
        currentTab = t;
        selectedIds.clear();
        updateActionBar();
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        document.getElementById('t-'+t).classList.add('active');
        document.getElementById('addBtn').classList.toggle('hidden', t !== 'active');
        loadProjects();
    }

    function createNewProject() {
        currentEditId = null;
        document.getElementById('pTitle').value = '';
        document.getElementById('pDate').value = '';
        document.getElementById('editHeader').innerText = 'Новый проект';
        showView('editorView');
    }

    async function openEdit(id) {
        const { data } = await client.from('projects').select('*').eq('id', id).single();
        currentEditId = data.id;
        document.getElementById('pTitle').value = data.title;
        document.getElementById('pDate').value = data.date_scout || '';
        document.getElementById('editHeader').innerText = 'Редактирование';
        showView('editorView');
    }

    async function saveProject() {
        const payload = {
            user_id: uid,
            title: document.getElementById('pTitle').value || "Без названия",
            date_scout: document.getElementById('pDate').value,
            status: 'active'
        };
        if (currentEditId) payload.id = currentEditId;
        await client.from('projects').upsert(payload);
        closeEditor();
    }

    function showView(v) {
        document.getElementById('mainView').classList.add('hidden');
        document.getElementById('editorView').classList.add('hidden');
        document.getElementById(v).classList.remove('hidden');
    }

    function closeEditor() { showView('mainView'); loadProjects(); }

    loadProjects();
</script>
</body>
</html>
